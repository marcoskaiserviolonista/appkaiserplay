<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>KaiserPlay — Braço Interativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #fff; font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      width: 100%; max-width: 520px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px;
      background: #111;
      border-bottom: 2px solid #222;
    }
    .header img { height: 40px; object-fit: contain; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .hstat { display: flex; flex-direction: column; align-items: center; }
    .hstat-val { font-family: 'Fredoka One', cursive; font-size: 20px; color: #F5A623; line-height: 1; }
    .hstat-lbl { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: .5px; }
    .streak-val { color: #ff6b35; }

    /* ── XP Bar ───────────────────────────────────────────────────── */
    .xp-wrap { width: 100%; max-width: 520px; padding: 6px 16px 0; }
    .xp-row { display: flex; align-items: center; gap: 8px; }
    .xp-lbl { font-size: 11px; color: #555; white-space: nowrap; }
    .xp-track { flex: 1; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
    .xp-fill { height: 100%; background: #F5A623; border-radius: 4px; transition: width .3s; }

    /* ── Game content ─────────────────────────────────────────────── */
    .game-area {
      width: 100%; max-width: 520px;
      padding: 18px 16px 0;
      display: flex; flex-direction: column; align-items: center;
    }
    .chord-name {
      font-family: 'Fredoka One', cursive;
      font-size: 80px; color: #fff; line-height: 1;
      text-align: center; margin-bottom: 4px;
    }
    .instruction {
      color: #888; font-size: 13px; text-align: center;
      padding: 0 20px; margin-bottom: 10px; min-height: 20px;
    }
    .result-msg {
      font-size: 20px; font-weight: 700; text-align: center;
      min-height: 30px; margin-bottom: 10px;
    }
    .result-msg.correct { color: #4caf50; }
    .result-msg.wrong   { color: #f44336; }

    /* ── Botões ───────────────────────────────────────────────────── */
    .btns {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 10px; width: 100%; margin-bottom: 16px;
    }
    .btn {
      background: #F5A623; color: #111;
      border: 3px solid #000; box-shadow: 3px 3px 0 #000;
      font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px;
      padding: 11px 26px; border-radius: 12px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 #000; }
    .btn-sec {
      background: #222; color: #ccc;
      border-color: #444; box-shadow: 3px 3px 0 #444;
    }
    .btn-sec:active { box-shadow: 1px 1px 0 #444; }

    /* ── Fretboard ────────────────────────────────────────────────── */
    .fb-wrap { width: 100%; max-width: 520px; display: flex; justify-content: center; }
    .fb-wrap svg { display: block; width: 100%; height: auto; }

    /* ── Notes hint ───────────────────────────────────────────────── */
    .notes-hint {
      font-size: 12px; color: #555; text-align: center;
      padding: 12px 16px 32px; max-width: 520px;
    }
    .notes-hint span { color: #777; }

    /* ── Clickable cells ──────────────────────────────────────────── */
    .fc { cursor: pointer; touch-action: manipulation; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="LOGO-APP-2.png" alt="KaiserPlay"
      onerror="this.style.display='none'">
    <div class="header-right">
      <div class="hstat">
        <div class="hstat-val streak-val" id="h-streak">0</div>
        <div class="hstat-lbl">streak</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="h-pts">0</div>
        <div class="hstat-lbl">pontos</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="h-lvl">1</div>
        <div class="hstat-lbl">nível</div>
      </div>
    </div>
  </div>

  <!-- XP Bar -->
  <div class="xp-wrap">
    <div class="xp-row">
      <div class="xp-lbl" id="h-xp">XP 0</div>
      <div class="xp-track"><div class="xp-fill" id="h-xpfill" style="width:0%"></div></div>
      <div class="xp-lbl" id="h-xpmax">/ 200</div>
    </div>
  </div>

  <!-- Game area -->
  <div class="game-area" id="game-area"></div>

  <!-- Fretboard -->
  <div class="fb-wrap" id="fb-wrap"></div>

  <!-- Notes hint -->
  <div class="notes-hint" id="notes-hint"></div>

  <script>
  // ── Audio ──────────────────────────────────────────────────────
  var _actx;
  function actx() {
    if (!_actx) _actx = new (window.AudioContext || window.webkitAudioContext)();
    if (_actx.state === 'suspended') _actx.resume();
    return _actx;
  }
  function playNote(midi, delay) {
    delay = delay || 0;
    var c = actx(), t = c.currentTime + delay;
    var freq = 440 * Math.pow(2, (midi - 69) / 12);
    var osc = c.createOscillator(), flt = c.createBiquadFilter(), gain = c.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    flt.type = 'lowpass';
    flt.frequency.setValueAtTime(7000, t);
    flt.frequency.exponentialRampToValueAtTime(700, t + 0.35);
    flt.Q.value = 1.2;
    gain.gain.setValueAtTime(0.38, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 2.2);
    osc.connect(flt); flt.connect(gain); gain.connect(c.destination);
    osc.start(t); osc.stop(t + 2.3);
  }
  function playCells(cells) {
    cells.forEach(function(k) {
      var p = k.split('-').map(Number);
      playNote(OPEN[p[0]] + p[1]);
    });
  }

  // ── Constantes musicais ────────────────────────────────────────
  var OPEN   = [40, 45, 50, 55, 59, 64];
  var SNAMES = ['E', 'A', 'D', 'G', 'B', 'e'];
  var NNAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  // ── Banco de acordes ──────────────────────────────────────────
  var CHORDS = [
    { name:'Am',    notes:[9,0,4],       fifth:4,  opt5:false },
    { name:'C',     notes:[0,4,7],       fifth:7,  opt5:false },
    { name:'G',     notes:[7,11,2],      fifth:2,  opt5:false },
    { name:'Em',    notes:[4,7,11],      fifth:11, opt5:false },
    { name:'D',     notes:[2,6,9],       fifth:9,  opt5:false },
    { name:'A',     notes:[9,1,4],       fifth:4,  opt5:false },
    { name:'E',     notes:[4,8,11],      fifth:11, opt5:false },
    { name:'Dm',    notes:[2,5,9],       fifth:9,  opt5:false },
    { name:'Bm',    notes:[11,2,6],      fifth:6,  opt5:false },
    { name:'G7',    notes:[7,11,2,5],    fifth:2,  opt5:true  },
    { name:'Am7',   notes:[9,0,4,7],     fifth:4,  opt5:true  },
    { name:'D7',    notes:[2,6,9,0],     fifth:9,  opt5:true  },
    { name:'E7',    notes:[4,8,11,2],    fifth:11, opt5:true  },
    { name:'C7(9)', notes:[0,4,7,10,2],  fifth:7,  opt5:true  },
    { name:'Em7',   notes:[4,7,11,2],    fifth:11, opt5:true  },
  ];

  // ── Layout do braço ───────────────────────────────────────────
  var SVG_W   = 224;
  var NUT_Y   = 90;
  var HEAD_Y  = 46;

  // Margem lateral = 12px → strings usam ~196px de 224px (87%)
  var CW_NUT  = 40;              // espaçamento entre cordas no nut
  var CW_BOT  = CW_NUT * 1.10;  // 10% mais largo no fret 12

  // Proporção fret 1 = 2.5:1  →  PLAY_H = 2.5 × CW_NUT / (2 × (1 - 2^(-1/12)))
  var PLAY_H = Math.round(2.5 * CW_NUT / (2 * (1 - Math.pow(2, -1 / 12))));
  // ≈ 891px

  var CENTER = Math.round(SVG_W / 2); // 112
  var NUT_X  = [];
  var BOT_X  = [];
  for (var _s = 0; _s < 6; _s++) {
    NUT_X.push(Math.round(CENTER - 5 * CW_NUT / 2 + _s * CW_NUT));
    BOT_X.push(Math.round(CENTER - 5 * CW_BOT / 2 + _s * CW_BOT));
  }

  function strX(s, t) {
    return NUT_X[s] + (BOT_X[s] - NUT_X[s]) * t;
  }

  var FRET_Y = [0];
  for (var _fi = 1; _fi <= 12; _fi++) {
    FRET_Y.push(Math.round(2 * PLAY_H * (1 - Math.pow(2, -_fi / 12))));
  }

  var SVG_H = NUT_Y + PLAY_H + 24;

  // Bordas de coluna para hit-testing
  var COL_EDGES = [0];
  for (var _ci = 0; _ci < 5; _ci++) {
    COL_EDGES.push(Math.round((NUT_X[_ci] + NUT_X[_ci + 1]) / 2));
  }
  COL_EDGES.push(SVG_W);

  // ── Estado ────────────────────────────────────────────────────
  var st = {
    ci: 0, chord: CHORDS[0], sel: {}, phase: 'play', ok: false,
    pts: 0, streak: 0, xp: 0, lvl: 1
  };
  var XP_PER_LVL = 200;

  // ── Validação ─────────────────────────────────────────────────
  function noteClass(s, f) { return (OPEN[s] + f) % 12; }
  function validate() {
    var keys = Object.keys(st.sel);
    if (!keys.length) return false;
    var chord = st.chord, got = {};
    keys.forEach(function(k) {
      var p = k.split('-').map(Number);
      got[noteClass(p[0], p[1])] = true;
    });
    var req = chord.notes.filter(function(n) {
      return !(chord.opt5 && n === chord.fifth);
    });
    for (var i = 0; i < req.length; i++) { if (!got[req[i]]) return false; }
    var all = {};
    chord.notes.forEach(function(n) { all[n] = true; });
    var gk = Object.keys(got);
    for (var j = 0; j < gk.length; j++) { if (!all[gk[j]]) return false; }
    return true;
  }

  // ── SVG do braço ──────────────────────────────────────────────
  function buildSVG() {
    var o = '';
    function a(s) { o += s; }

    a('<svg viewBox="0 0 ' + SVG_W + ' ' + SVG_H
      + '" xmlns="http://www.w3.org/2000/svg">');

    // Fundo
    a('<rect width="' + SVG_W + '" height="' + SVG_H + '" fill="#111"/>');

    // Headstock — duas diagonais + linha horizontal
    var hL = NUT_X[0] - 18;
    var hR = NUT_X[5] + 18;
    a('<line x1="' + NUT_X[0] + '" y1="' + NUT_Y + '" x2="' + hL + '" y2="' + HEAD_Y + '" stroke="#fff" stroke-width="2" stroke-linecap="round"/>');
    a('<line x1="' + NUT_X[5] + '" y1="' + NUT_Y + '" x2="' + hR + '" y2="' + HEAD_Y + '" stroke="#fff" stroke-width="2" stroke-linecap="round"/>');
    a('<line x1="' + hL + '" y1="' + HEAD_Y + '" x2="' + hR + '" y2="' + HEAD_Y + '" stroke="#fff" stroke-width="2" stroke-linecap="round"/>');

    // Nomes das cordas
    var labelY = HEAD_Y - 10;
    for (var sn = 0; sn < 6; sn++) {
      a('<text x="' + NUT_X[sn] + '" y="' + labelY + '"'
        + ' text-anchor="middle" dominant-baseline="alphabetic"'
        + ' fill="#ccc" font-size="13" font-weight="600"'
        + ' font-family="Poppins,sans-serif">' + SNAMES[sn] + '</text>');
    }

    // Cordas no headstock
    var ST = [2.2, 1.8, 1.4, 1.1, 0.9, 0.7];
    for (var sh = 0; sh < 6; sh++) {
      a('<line x1="' + NUT_X[sh] + '" y1="' + HEAD_Y + '" x2="' + NUT_X[sh] + '" y2="' + NUT_Y + '" stroke="#fff" stroke-width="' + ST[sh] + '" stroke-linecap="round"/>');
    }

    // Pestanejo (nut)
    a('<line x1="' + NUT_X[0] + '" y1="' + NUT_Y + '" x2="' + NUT_X[5] + '" y2="' + NUT_Y + '" stroke="#fff" stroke-width="5" stroke-linecap="round"/>');

    // Bordas laterais (levemente divergentes)
    a('<line x1="' + NUT_X[0] + '" y1="' + NUT_Y + '" x2="' + BOT_X[0] + '" y2="' + (NUT_Y + PLAY_H) + '" stroke="#fff" stroke-width="2" stroke-linecap="round"/>');
    a('<line x1="' + NUT_X[5] + '" y1="' + NUT_Y + '" x2="' + BOT_X[5] + '" y2="' + (NUT_Y + PLAY_H) + '" stroke="#fff" stroke-width="2" stroke-linecap="round"/>');

    // Cordas internas
    for (var ss = 1; ss <= 4; ss++) {
      a('<line x1="' + NUT_X[ss] + '" y1="' + NUT_Y + '" x2="' + BOT_X[ss] + '" y2="' + (NUT_Y + PLAY_H) + '" stroke="#fff" stroke-width="' + ST[ss] + '" stroke-linecap="round"/>');
    }

    // Trastes
    for (var fw = 1; fw <= 12; fw++) {
      var wy  = NUT_Y + FRET_Y[fw];
      var tn  = FRET_Y[fw] / PLAY_H;
      var wxL = Math.round(strX(0, tn));
      var wxR = Math.round(strX(5, tn));
      var wt  = fw === 12 ? 2.5 : 1.5;
      a('<line x1="' + wxL + '" y1="' + wy + '" x2="' + wxR + '" y2="' + wy + '" stroke="#fff" stroke-width="' + wt + '" stroke-linecap="round"/>');
    }

    // Números dos trastes
    for (var fl = 1; fl <= 12; fl++) {
      var fmid = (FRET_Y[fl - 1] + FRET_Y[fl]) / 2;
      var fmy  = Math.round(NUT_Y + fmid);
      var flx  = Math.round(strX(0, fmid / PLAY_H)) - 10;
      a('<text x="' + flx + '" y="' + (fmy + 4) + '" text-anchor="middle" fill="#444" font-size="10" font-family="Poppins,sans-serif">' + fl + '</text>');
    }

    // Círculos das notas
    var allNotes = {};
    st.chord.notes.forEach(function(n) { allNotes[n] = true; });

    Object.keys(st.sel).forEach(function(k) {
      var pts = k.split('-').map(Number), sc = pts[0], fc = pts[1];
      var nc = noteClass(sc, fc), inChord = allNotes[nc];

      var cx, cy, fspace;
      if (fc === 0) {
        cx     = NUT_X[sc];
        cy     = Math.round((HEAD_Y + NUT_Y) / 2);
        fspace = NUT_Y - HEAD_Y;
      } else {
        var fmv = (FRET_Y[fc - 1] + FRET_Y[fc]) / 2;
        cx      = Math.round(strX(sc, fmv / PLAY_H));
        cy      = Math.round(NUT_Y + fmv);
        fspace  = FRET_Y[fc] - FRET_Y[fc - 1];
      }

      var r  = Math.min(14, Math.floor(fspace * 0.40));
      var fs = r >= 12 ? '10' : '9';

      var fill, tf, stroke;
      if (st.phase === 'result') {
        fill = inChord ? '#4caf50' : '#f44336';
        tf = '#fff'; stroke = inChord ? '#1a3d1a' : '#3d1a1a';
      } else {
        fill = '#F5A623'; tf = '#111'; stroke = '#000';
      }

      a('<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="' + fill + '" stroke="' + stroke + '" stroke-width="2"/>');
      a('<text x="' + cx + '" y="' + (cy + 4) + '" text-anchor="middle" fill="' + tf + '" font-size="' + fs + '" font-weight="700" font-family="Poppins,sans-serif">' + NNAMES[nc] + '</text>');
    });

    // Células clicáveis transparentes
    for (var cs0 = 0; cs0 < 6; cs0++) {
      a('<rect x="' + COL_EDGES[cs0] + '" y="' + HEAD_Y + '" width="' + (COL_EDGES[cs0 + 1] - COL_EDGES[cs0]) + '" height="' + (NUT_Y - HEAD_Y) + '" fill="transparent" class="fc" data-k="' + cs0 + '-0"/>');
    }
    for (var cs = 0; cs < 6; cs++) {
      for (var cf = 1; cf <= 12; cf++) {
        var ry = NUT_Y + FRET_Y[cf - 1];
        var rh = FRET_Y[cf] - FRET_Y[cf - 1];
        a('<rect x="' + COL_EDGES[cs] + '" y="' + ry + '" width="' + (COL_EDGES[cs + 1] - COL_EDGES[cs]) + '" height="' + rh + '" fill="transparent" class="fc" data-k="' + cs + '-' + cf + '"/>');
      }
    }

    a('</svg>');
    return o;
  }

  // ── Ações ─────────────────────────────────────────────────────
  function doConfirm() {
    st.ok = validate();
    st.phase = 'result';
    var keys = Object.keys(st.sel);
    if (keys.length) playCells(keys);
    if (st.ok) {
      st.streak++;
      st.pts += 5 + st.streak;
      st.xp  += 10;
      if (st.xp >= XP_PER_LVL) { st.xp -= XP_PER_LVL; st.lvl++; }
    } else {
      st.streak = 0;
    }
    render();
  }
  function doClear() { st.sel = {}; render(); }
  function doPlay()  { playCells(Object.keys(st.sel)); }
  function doNext()  {
    st.ci    = (st.ci + 1) % CHORDS.length;
    st.chord = CHORDS[st.ci];
    st.sel   = {};
    st.phase = 'play';
    st.ok    = false;
    render();
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    var chord    = st.chord;
    var selKeys  = Object.keys(st.sel);
    var hasNotes = selKeys.length > 0;

    // Header stats
    document.getElementById('h-streak').textContent = st.streak;
    document.getElementById('h-pts').textContent    = st.pts;
    document.getElementById('h-lvl').textContent    = st.lvl;
    document.getElementById('h-xp').textContent     = 'XP ' + st.xp;
    document.getElementById('h-xpmax').textContent  = '/ ' + XP_PER_LVL;
    document.getElementById('h-xpfill').style.width = Math.min(100, st.xp / XP_PER_LVL * 100) + '%';

    // Notes list for hint
    var notesList = chord.notes.map(function(n) {
      return NNAMES[n] + (chord.opt5 && n === chord.fifth ? '*' : '');
    }).join(', ');
    var opt5hint = chord.opt5 ? ' <span>(* 5ª pode ser omitida)</span>' : '';

    // Result / instruction
    var resultHTML = '';
    var instrText  = '';
    if (st.phase === 'result') {
      resultHTML = '<div class="result-msg ' + (st.ok ? 'correct' : 'wrong') + '">'
        + (st.ok ? '✓ Correto! +' + (5 + st.streak) + ' pts' : '✗ Notas erradas em vermelho') + '</div>';
      instrText = st.ok ? 'Todas as notas certas!' : 'Verifique as notas em vermelho.';
    } else {
      resultHTML = '<div class="result-msg"></div>';
      instrText  = 'Marque as notas do acorde no braço';
    }

    // Buttons ABOVE the fretboard
    var btnsHTML = '';
    if (st.phase === 'play') {
      if (hasNotes) {
        btnsHTML += '<button class="btn" onclick="doConfirm()">Confirmar</button>';
        btnsHTML += '<button class="btn btn-sec" onclick="doPlay()">▶ Ouvir</button>';
        btnsHTML += '<button class="btn btn-sec" onclick="doClear()">Limpar</button>';
      }
    } else {
      btnsHTML += '<button class="btn" onclick="doNext()">Próximo →</button>';
      if (hasNotes) btnsHTML += '<button class="btn btn-sec" onclick="doPlay()">▶ Ouvir</button>';
    }

    document.getElementById('game-area').innerHTML =
      '<div class="chord-name">' + chord.name + '</div>' +
      '<p class="instruction">' + instrText + '</p>' +
      resultHTML +
      '<div class="btns">' + btnsHTML + '</div>';

    document.getElementById('fb-wrap').innerHTML = buildSVG();
    document.getElementById('notes-hint').innerHTML =
      'Notas: ' + notesList + opt5hint;

    document.querySelectorAll('.fc').forEach(function(el) {
      el.addEventListener('click', function() {
        if (st.phase === 'result') return;
        var k = el.dataset.k, parts = k.split('-').map(Number);
        if (st.sel[k]) { delete st.sel[k]; }
        else { st.sel[k] = true; playNote(OPEN[parts[0]] + parts[1]); }
        render();
      });
    });
  }

  render();
  </script>
</body>
</html>
