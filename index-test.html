// ── Sistema de avaliação ──────────────────────────────────────
function checkRatingPrompt(lvlN){
  if(state.ratingDone||state.ratingSkippedAt>=30)return;
  const show=(lvlN>=10&&state.ratingSkippedAt===0)||(lvlN>=20&&state.ratingSkippedAt===10)||(lvlN>=30&&state.ratingSkippedAt===20);
  if(show)setTimeout(showRatingPrompt,2500);
}
function showRatingPrompt(){
  if(state.ratingDone||document.getElementById('_rating-overlay'))return;
  const overlay=document.createElement('div');
  overlay.id='_rating-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#000a;z-index:9998;display:flex;align-items:center;justify-content:center;padding:1rem';
  overlay.innerHTML=`
    <div style="background:#1a1a1a;border:3px solid #F5A623;border-radius:18px;padding:1.5rem;max-width:300px;width:100%;text-align:center;box-shadow:6px 6px 0 #111">
      <div style="font-size:2rem;margin-bottom:.4rem">⭐</div>
      <div style="font-size:.95rem;font-weight:900;color:#F5A623;margin-bottom:.5rem">${t('rate_popup_title')}</div>
      <div style="font-size:.82rem;color:#999;margin-bottom:1.2rem;line-height:1.5">${t('rate_popup_body')}</div>
      <button id="_rate-now" style="width:100%;padding:.75rem;background:linear-gradient(180deg,#ffbe4f,#F5A623);border:3px solid #111;border-radius:12px;box-shadow:3px 3px 0 #111;color:#111;font-size:.9rem;font-weight:900;font-family:var(--font-body);cursor:pointer;margin-bottom:.6rem">${t('rate_now')}</button>
      <button id="_rate-later" style="width:100%;padding:.4rem;background:transparent;border:none;color:#555;font-size:.78rem;font-weight:600;font-family:var(--font-body);cursor:pointer;text-decoration:underline">${t('rate_later')}</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#_rate-now').onclick=()=>{
    state.ratingDone=true;
    saveProgress();
    overlay.remove();
    window.open('#LOJA_URL','_blank'); // substituir pela URL da loja quando publicado
  };
  overlay.querySelector('#_rate-later').onclick=()=>{
    state.ratingSkippedAt=state.ratingSkippedAt===0?10:state.ratingSkippedAt===10?20:30;
    saveProgress();
    overlay.remove();
  };
}

// ── Firestore: salvar e carregar progresso ────────────────────
function saveProgress(){
  if(!state.user)return;
  _saveTimer=null;
  db.collection('players').doc(state.user.uid).set({
    displayName:state.user.displayName||'',
    xp:state.xp,
    notas:state.notas,
    moedas:state.moedas,
    diamantes:state.diamantes,
    bestStreak:state.bestStreak,
    stats:state.stats,
    chordStats:state.chordStats,
    violaoEquipado:state.violaoEquipado,
    violoesComprados:state.violoesComprados,
    inventario:state.inventario,
    firstCardSeen:state.firstCardSeen,
    ratingDone:state.ratingDone,
    ratingSkippedAt:state.ratingSkippedAt,
  }).catch(e=>console.error('saveProgress error:',e));
}
async function loadProgress(uid){
  try{
    const doc=await db.collection('players').doc(uid).get();
    if(doc.exists){
      const d=doc.data();
      if(d.xp!=null)state.xp=d.xp;
      if(d.notas!=null)state.notas=d.notas;
      if(d.moedas!=null)state.moedas=d.moedas;
      if(d.diamantes!=null)state.diamantes=d.diamantes;
      if(d.bestStreak!=null)state.bestStreak=d.bestStreak;
      if(d.stats)state.stats=d.stats;
      if(d.chordStats)state.chordStats=d.chordStats;
      if(d.violaoEquipado)state.violaoEquipado=d.violaoEquipado;
      if(d.violoesComprados)state.violoesComprados=d.violoesComprados;
      if(d.inventario)state.inventario=d.inventario;
      if(d.firstCardSeen!=null)state.firstCardSeen=d.firstCardSeen;
      if(d.ratingDone!=null)state.ratingDone=d.ratingDone;
      if(d.ratingSkippedAt!=null)state.ratingSkippedAt=d.ratingSkippedAt;
      state.xpDisplay=state.xp;
    }
  }catch(e){console.error('loadProgress error:',e);}
}

// ── Auth ──────────────────────────────────────────────────────
function loginUser(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!password){errEl.textContent=t('fill_all_fields');return;}
  auth.signInWithEmailAndPassword(email,password)
    .catch(e=>{errEl.textContent=_authError(e.code);});
}
function forgotPassword(){
  const email=document.getElementById('forgot-email').value.trim();
  const errEl=document.getElementById('forgot-error');
  errEl.style.color='';
  if(!email){errEl.textContent=t('enter_email_first');return;}
  auth.sendPasswordResetEmail(email)
    .then(()=>{errEl.style.color='#4ade80';errEl.textContent=t('reset_email_sent');})
    .catch(e=>{errEl.textContent=_authError(e.code);});
}
function signupUser(){
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  const passwordConfirm=document.getElementById('signup-password-confirm').value;
  const name=document.getElementById('signup-name').value.trim();
  const errEl=document.getElementById('signup-error');
  errEl.textContent='';
  if(!email||!password||!passwordConfirm||!name){errEl.textContent=t('fill_all_fields');return;}
  if(password.length<6){errEl.textContent=t('password_too_short');return;}
  if(password!==passwordConfirm){errEl.textContent=t('passwords_dont_match');return;}
  auth.createUserWithEmailAndPassword(email,password)
    .then(cred=>cred.user.updateProfile({displayName:name}))
    .then(()=>{state.isGuest=false;state.user=auth.currentUser;state.phase='start';render();})
    .catch(e=>{errEl.textContent=_authError(e.code);});
}
function logoutUser(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  stopRankingListener();
  auth.signOut();
}
function _authError(code){
  const map={
    'auth/invalid-email':t('auth_invalid_email'),
    'auth/user-disabled':t('auth_user_disabled'),
    'auth/user-not-found':t('auth_user_not_found'),
    'auth/wrong-password':t('auth_wrong_password'),
    'auth/email-already-in-use':t('auth_email_in_use'),
    'auth/weak-password':t('auth_weak_password'),
    'auth/too-many-requests':t('auth_too_many_requests'),
    'auth/network-request-failed':t('auth_network_error'),
    'auth/invalid-credential':t('auth_wrong_password'),
  };
  return map[code]||t('auth_generic_error');
}

// ── 9. INICIALIZAÇÃO ──────────────────────────────────────────
auth.onAuthStateChanged(async user=>{
  state.user=user||null;
  if(user){
    state.isGuest=false;
    await loadProgress(user.uid);
    startRankingListener();
    if(state.phase==='login'||state.phase==='set_display_name'){
      if(state._pendingDisplayName){state.phase='set_display_name';state._pendingDisplayName=false;}
      else{state.phase='start';}
    }
  } else {
    stopRankingListener();
    state.rankingData=[];
    // Only redirect to login if not in guest mode
    if(!state.isGuest){state.phase='login';}
  }
  try{render();}catch(e){console.error('render error:',e);}
});

// ── Fretboard: delegação de clique (registrado uma vez, nunca dentro do render) ──
document.getElementById('content').addEventListener('click',function(e){
  if(!state.isFretboard)return;
  if(state.phase!=='question'&&state.phase!=='treino_focado_question')return;
  let el=e.target;
  while(el&&!el.dataset.fbk&&el!==this)el=el.parentElement;
  if(!el||!el.dataset.fbk)return;
  const k=el.dataset.fbk,parts=k.split('-').map(Number);
  if(state.fbSel[k]){delete state.fbSel[k];}
  else{state.fbSel[k]=true;playFbNoteClick(FB_OPEN[parts[0]]+parts[1]);}
  render();
});
</script>
