<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaiserPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.15)}100%{opacity:0;transform:translateY(-80px) scale(.9)}}
@keyframes correctFlash{0%{background:#111}20%{background:#1a2e1a}100%{background:#111}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes bonusBurst{0%{transform:scale(1)}30%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{from{opacity:.8}to{opacity:1;text-shadow:0 0 14px rgba(245,166,35,.7)}}
@keyframes scoreCount{0%{transform:scale(1.6);color:#F5A623}100%{transform:scale(1)}}
@keyframes borderGlow{0%,100%{box-shadow:4px 4px 0 #111,0 0 0 0 rgba(245,166,35,.3)}50%{box-shadow:4px 4px 0 #111,0 0 0 4px rgba(245,166,35,.15)}}
@keyframes lvlupEntrance{0%{opacity:0;transform:scale(.7) translateY(30px)}60%{transform:scale(1.04) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}

body{background:#111;color:#f0f0f0;font-family:'Poppins',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2.5rem;min-height:100vh;background:#111}
.app.flash-correct{animation:correctFlash .5s ease}

.header{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 0 1rem;border-bottom:3px solid #222;margin-bottom:1.25rem}
.logo{display:flex;align-items:center;gap:.55rem}
.logo-icon{width:36px;height:36px;background:#F5A623;border-radius:10px;border:3px solid #1a1a1a;box-shadow:3px 3px 0 #1a1a1a;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.logo-text{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:#f0f0f0}
.logo-text span{color:#F5A623}
.header-tab{font-size:.72rem;font-weight:700;color:#888;cursor:pointer;padding:.35rem .75rem;border-radius:20px;border:2.5px solid transparent;transition:all .15s;letter-spacing:.03em;text-transform:uppercase}
.header-tab.active{color:#1a1a1a;background:#F5A623;border-color:#1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
.header-tab:hover:not(.active){color:#ddd;border-color:#333}

.lvl-bar{width:100%;max-width:480px;background:#1e1e1e;border-radius:18px;padding:1rem 1.25rem;margin-bottom:1rem;border:3px solid #2a2a2a;box-shadow:4px 4px 0 #1a1a1a}
.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.7rem}
.lvl-name{font-size:.82rem;font-weight:700;color:#F5A623;letter-spacing:.02em}
.lvl-xp{font-size:.72rem;color:#999;font-weight:600}
.xp-track{height:10px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a}
.xp-fill{height:100%;background:#F5A623;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

.stats{width:100%;max-width:480px;display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1rem}
.stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:.85rem .5rem;text-align:center;box-shadow:4px 4px 0 #151515}
.stat-val{font-size:1.4rem;font-weight:900;color:#f0f0f0;line-height:1}

.play-area{width:100%;max-width:480px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:1.5rem 1.25rem 1.25rem;margin-bottom:1rem;box-shadow:5px 5px 0 #151515}

.play-btn{display:block;width:100%;background:#F5A623;color:#fff;font-family:'Poppins',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.04em;padding:.9rem;border:3px solid #1a1a1a;border-radius:14px;box-shadow:4px 4px 0 #1a1a1a;cursor:pointer;transition:all .12s;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.play-btn:hover:not(:disabled){background:#fdb72a;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.play-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}

.q-label{font-size:.62rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.12em;text-align:center;margin-bottom:.8rem;margin-top:1.25rem}

.start-cta:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #1a1a1a}

.levels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}

.lvlup-title{font-size:1.8rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem;color:#f0f0f0}

.section-title{font-size:.62rem;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem}
.rank-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:20px;overflow:hidden;margin-bottom:1rem;box-shadow:5px 5px 0 #151515}
.rank-row{display:flex;align-items:center;gap:.85rem;padding:.9rem 1.1rem;border-bottom:2px solid #252525;transition:background .15s}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:#222}
.rank-row.me{background:#1f1a00;border-left:4px solid #F5A623}
.rank-pos{font-size:.82rem;font-weight:900;color:#444;width:20px;text-align:center}
.rank-pos.top{color:#F5A623}
.rank-avatar{width:34px;height:34px;border-radius:50%;background:#252525;border:2.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#aaa;flex-shrink:0}
.rank-info{flex:1}
.rank-name{font-size:.84rem;font-weight:700;color:#e8e8e8}
.rank-lvl{font-size:.65rem;color:#999;font-weight:500;margin-top:.1rem}
.rank-xp{font-size:.8rem;font-weight:800;color:#F5A623}

.streak-banner{width:100%;max-width:480px;margin-bottom:.7rem;background:#F5A623;border:3px solid #1a1a1a;border-radius:14px;box-shadow:4px 4px 0 #1a1a1a;padding:.6rem 1.1rem;display:flex;align-items:center;justify-content:space-between;animation:slideUp .2s ease}
.streak-text{font-size:.82rem;font-weight:800;color:#1a1a1a}
.streak-fire{font-size:1.2rem}

#particle-canvas{position:fixed;top:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:999;width:480px;height:600px}
#xp-floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998}
.xp-float{position:absolute;color:#F5A623;font-weight:900;font-family:'Poppins',sans-serif;text-shadow:0 0 12px rgba(245,166,35,.8);animation:floatUp .9s ease forwards;white-space:nowrap}
</style>

<body>
<canvas id="particle-canvas" width="480" height="600"></canvas>
<div id="xp-floats"></div>
<div class="app" id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <span class="logo-text">Kaiser<span>Play</span></span>
    </div>
    <div style="display:flex;gap:.25rem">
      <div class="header-tab active" id="tab-game" onclick="setTab('game')">Treino</div>
      <div class="header-tab" id="tab-ranking" onclick="setTab('ranking')">Ranking</div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────
const CHORDS = [
  {id:0,  name:"Dó Maior",  midi:[48,52,55,60,64]},
  {id:1,  name:"Ré Maior",  midi:[50,57,62,66]},
  {id:2,  name:"Mi Maior",  midi:[40,47,52,56,59,64]},
  {id:3,  name:"Fá Maior",  midi:[41,48,53,57,60,65]},
  {id:4,  name:"Sol Maior", midi:[43,47,50,55,59,67]},
  {id:5,  name:"Lá Maior",  midi:[45,52,57,61,64]},
  {id:6,  name:"Si Maior",  midi:[47,54,59,63,66]},
  {id:7,  name:"Dó Menor",  midi:[48,55,60,63,67]},
  {id:8,  name:"Ré Menor",  midi:[50,57,62,65]},
  {id:9,  name:"Mi Menor",  midi:[40,47,52,55,59,64]},
  {id:10, name:"Fá Menor",  midi:[41,48,53,56,60,65]},
  {id:11, name:"Sol Menor", midi:[43,50,55,58,62,67]},
  {id:12, name:"Lá Menor",  midi:[45,52,57,60,64]},
  {id:13, name:"Si Menor",  midi:[47,54,59,62,66]},
  {id:14, name:"Dó Dom.7",  midi:[48,52,58,60,64]},
  {id:15, name:"Sol Dom.7", midi:[43,47,50,55,59,65]},
  {id:16, name:"Fá Dom.7",  midi:[41,48,51,57,60,65]},
  {id:17, name:"Ré Dom.7",  midi:[50,57,60,66]},
  {id:18, name:"Lá Dom.7",  midi:[45,52,55,61,64]},
];

const LEVELS = [
  {n:1, title:"Iniciante",     xpToNext:80,    pool:[0,3,4,5],             desc:"Acordes maiores básicos"},
  {n:2, title:"Aprendiz",      xpToNext:180,   pool:[0,1,2,3,4,5,6],       desc:"Todos os maiores"},
  {n:3, title:"Intermediário", xpToNext:350,   pool:[0,1,2,3,4,5,6,8,9,12],desc:"+ Acordes menores"},
  {n:4, title:"Avançado",      xpToNext:600,   pool:[...Array.from({length:14},(_,i)=>i)], desc:"Todos maiores e menores"},
  {n:5, title:"Expert",        xpToNext:1000,  pool:[...Array.from({length:14},(_,i)=>i),14,15,16], desc:"+ Dominante 7ª"},
  {n:6, title:"Mestre",        xpToNext:99999, pool:[...Array.from({length:19},(_,i)=>i)], desc:"Repertório completo"},
];

const MOCK_RANKING = [
  {name:"GuitarHero92",xp:4820,lvl:6},
  {name:"MusicMind",   xp:3210,lvl:5},
  {name:"ChordMaster", xp:2780,lvl:5},
  {name:"NoteNinja",   xp:1950,lvl:4},
  {name:"StringSage",  xp:1420,lvl:4},
];

// Available sample notes
const SAMPLE_NOTES = [40,43,45,48,50,53,55,57,59,62,64,67];

// ── Audio ─────────────────────────────────────────────────────
let audioCtx = null;
const bufferCache = {};

function getCtx() {
  if (!audioCtx || audioCtx.state === 'closed')
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function nearestSample(midi) {
  return SAMPLE_NOTES.reduce((a, b) => Math.abs(b - midi) < Math.abs(a - midi) ? b : a);
}

async function loadSample(note) {
  if (bufferCache[note]) return bufferCache[note];
  const ctx = getCtx();
  const resp = await fetch(`sounds/note-${note}.ogg`);
  const ab = await resp.arrayBuffer();
  const buf = await ctx.decodeAudioData(ab);
  bufferCache[note] = buf;
  return buf;
}

// Guitar Pro samples are recorded 2 semitones higher than their filename suggests


// Guitar Pro samples are tuned 2 semitones higher than their filename indicates


async function playNote(midi, startTime, masterGain) {
  const ctx = getCtx();
  const sampleNote = nearestSample(midi);
  const buf = await loadSample(sampleNote);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.playbackRate.value = midiToFreq(midi) / midiToFreq(sampleNote);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(0, startTime + 0.005);
  g.gain.linearRampToValueAtTime(1.0 / state.chord.midi.length, startTime + 0.05);
  g.gain.setTargetAtTime(0, startTime + 2.0, 1.0);
  src.connect(g); g.connect(masterGain);
  src.start(startTime);
}

async function playChord(chord) {
  if (state.playing) return;
  state.playing = true; render();
  try {
    const ctx = getCtx();
    if (ctx.state === 'suspended') await ctx.resume();
    const master = ctx.createGain(); master.gain.value = 1.0;
    const lim = ctx.createDynamicsCompressor();
    lim.threshold.value = -3; lim.ratio.value = 6;
    lim.knee.value = 6; lim.attack.value = 0.003; lim.release.value = 0.25;
    master.connect(lim); lim.connect(ctx.destination);
    const now = ctx.currentTime;
    await Promise.all(chord.midi.map((m, i) => playNote(m, now + i * 0.11, master)));
    setTimeout(() => { state.playing = false; render(); }, chord.midi.length * 110 + 3500);
  } catch(e) { console.error(e); state.playing = false; render(); }
}

function playSfx(type) {
  const ctx = getCtx();
  const t = ctx.currentTime;
  const notes = {
    correct: [[523,0],[659,.1]],
    bonus:   [[523,0],[659,.07],[784,.14],[1047,.21]],
    levelup: [[392,0],[523,.1],[659,.2],[784,.3],[1047,.4]],
  };
  if (notes[type]) {
    notes[type].forEach(([freq, delay]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = type === 'correct' ? 'sine' : 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0, t+delay);
      g.gain.linearRampToValueAtTime(.15, t+delay+.015);
      g.gain.exponentialRampToValueAtTime(.001, t+delay+.4);
      o.connect(g); g.connect(ctx.destination);
      o.start(t+delay); o.stop(t+delay+.5);
    });
  } else if (type === 'wrong') {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(110, t+.2);
    g.gain.setValueAtTime(.12, t); g.gain.exponentialRampToValueAtTime(.001, t+.25);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+.3);
  }
}

// ── Particles ─────────────────────────────────────────────────
let particles = [], _pid = 0;
const canvas = document.getElementById('particle-canvas');
const ctx2d = canvas.getContext('2d');

function makeParticles(x, y, count, isBonus) {
  return Array.from({length:count}, () => ({
    id: _pid++, x, y,
    vx: (Math.random()-.5)*(isBonus?18:12),
    vy: -(Math.random()*(isBonus?16:10)+4),
    size: Math.random()*(isBonus?10:7)+4,
    color: isBonus
      ? ["#F5A623","#FFD700","#fff","#ff9800"][Math.floor(Math.random()*4)]
      : ["#F5A623","#22c55e","#fff"][Math.floor(Math.random()*3)],
    life: 1, decay: Math.random()*.04+.025,
    shape: Math.random()>.5?'circle':'star',
  }));
}

function drawParticles() {
  ctx2d.clearRect(0,0,480,600);
  particles.forEach(p => {
    ctx2d.save(); ctx2d.globalAlpha = p.life; ctx2d.fillStyle = p.color;
    ctx2d.translate(p.x, p.y);
    if (p.shape === 'star') {
      ctx2d.beginPath();
      for (let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;i===0?ctx2d.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size):ctx2d.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size)}
      ctx2d.closePath(); ctx2d.fill();
    } else { ctx2d.beginPath(); ctx2d.arc(0,0,p.size/2,0,Math.PI*2); ctx2d.fill(); }
    ctx2d.restore();
  });
  particles = particles.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.6,life:p.life-p.decay})).filter(p=>p.life>0);
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── XP Floats ─────────────────────────────────────────────────
let _fid = 0;
function spawnFloat(x, y, text, big) {
  const el = document.createElement('div');
  el.className = 'xp-float';
  el.style.left = (x-30)+'px'; el.style.top = (y-20)+'px';
  el.style.fontSize = big ? '1.4rem' : '1rem';
  el.textContent = text;
  document.getElementById('xp-floats').appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// ── State ─────────────────────────────────────────────────────
function getLvlIdx(xp) {
  let cum = 0;
  for (let i=0;i<LEVELS.length-1;i++){cum+=LEVELS[i].xpToNext;if(xp<cum)return i;}
  return LEVELS.length-1;
}
function getLvlStartXP(idx) { return LEVELS.slice(0,idx).reduce((s,l)=>s+l.xpToNext,0); }

const state = {
  tab:'game', phase:'start',
  chord:null, choices:[], selected:null,
  xp:0, streak:0, score:0, result:null,
  stats:{t:0,c:0}, playing:false, lvlUpPending:false,
};

function genQ() {
  const lIdx = getLvlIdx(state.xp);
  const pool = LEVELS[lIdx].pool.map(i=>CHORDS[i]);
  const ans = pool[Math.floor(Math.random()*pool.length)];
  const wrong = pool.filter(c=>c.id!==ans.id).sort(()=>Math.random()-.5).slice(0,3);
  state.chord = ans;
  state.choices = [ans,...wrong].sort(()=>Math.random()-.5);
  state.selected = null;
  state.result = null;
}

function handleAnswer(choiceId, btnEl) {
  if (state.selected !== null || state.phase !== 'question') return;
  state.selected = choiceId;
  const ok = choiceId === state.chord.id;
  const newStreak = ok ? state.streak+1 : 0;
  state.streak = newStreak;
  state.stats.t++; if(ok) state.stats.c++;
  let gain=ok?10:0, bonus=0, msg=null;
  if (ok) {
    if(newStreak>=10){bonus=20;msg=`🔥 Combo ×${newStreak}!`}
    else if(newStreak>=5){bonus=10;msg=`⚡ Sequência ×${newStreak}!`}
    else if(newStreak>=3){bonus=5;msg=`✨ Sequência ×${newStreak}!`}
    gain+=bonus;
    state.score+=gain; state.xp+=gain;
    const lvlBefore = getLvlIdx(state.xp-gain);
    if(getLvlIdx(state.xp)>lvlBefore) state.lvlUpPending=true;
    playSfx(bonus>0?'bonus':'correct');
    const rect = btnEl.getBoundingClientRect();
    const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
    const cl = (window.innerWidth-480)/2;
    particles.push(...makeParticles(cx-cl, cy, bonus>0?18:10, bonus>0));
    spawnFloat(cx, cy, `+${gain} XP`, bonus>0);
    document.getElementById('app').classList.add('flash-correct');
    setTimeout(()=>document.getElementById('app').classList.remove('flash-correct'),500);
  } else {
    playSfx('wrong');
    document.querySelector('.play-area')?.classList.add('shake');
    setTimeout(()=>document.querySelector('.play-area')?.classList.remove('shake'),400);
  }
  state.result = {ok, gain, bonus, msg, chordName:state.chord.name};
  state.phase = 'answered';
  render();
}

function setTab(t) { state.tab=t; render(); }

// ── Render ────────────────────────────────────────────────────
function render() {
  document.getElementById('tab-game').className='header-tab'+(state.tab==='game'?' active':'');
  document.getElementById('tab-ranking').className='header-tab'+(state.tab==='ranking'?' active':'');
  const c = document.getElementById('content');
  if (state.tab==='ranking') { c.innerHTML=renderRanking(); return; }

  if (state.phase==='start')   { c.innerHTML=renderStart(); return; }
  if (state.phase==='levelup') { c.innerHTML=renderLevelUp(); return; }

  const lvlIdx=getLvlIdx(state.xp), lvl=LEVELS[lvlIdx];
  const lvlStart=getLvlStartXP(lvlIdx);
  const prog=Math.min((state.xp-lvlStart)/lvl.xpToNext,1)*100;
  const acc=state.stats.t>0?Math.round(state.stats.c/state.stats.t*100):0;

  c.innerHTML=`
    <div class="lvl-bar">
      <div class="lvl-row">
        <span class="lvl-name">Nível ${lvl.n} · ${lvl.title}</span>
        <span class="lvl-xp">${state.xp-lvlStart} / ${lvl.xpToNext} XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${prog}%"></div></div>
    </div>
    ${state.result?.msg&&state.phase==='answered'?`<div class="streak-banner"><span class="streak-text">${state.result.msg}</span><span class="streak-fire">🔥</span></div>`:''}
    <div class="stats">
      <div class="stat-card"><div class="stat-val orange">${state.score}</div><div class="stat-lbl">Pontos</div></div>
      <div class="stat-card"><div class="stat-val ${state.streak>=3?'streak':''}">${state.streak}</div><div class="stat-lbl">Sequência</div></div>
      <div class="stat-card"><div class="stat-val">${acc}%</div><div class="stat-lbl">Acertos</div></div>
    </div>
    <div class="play-area">
      <div class="play-label">Ouça o acorde</div>
      <button class="play-btn ${state.playing?'playing':''}" onclick="if(!state.playing)playChord(state.chord)" ${state.playing?'disabled':''}>
        ${state.playing?'♪  Tocando...':'▶  Ouvir Acorde'}
      </button>
      <div class="q-label">Qual é este acorde?</div>
      <div class="choices">
        ${state.choices.map(ch=>{
          let cls='choice';
          if(state.phase==='answered'){
            cls+=' locked';
            if(ch.id===state.chord.id) cls+=' correct';
            else if(ch.id===state.selected) cls+=' wrong';
            else cls+=' dim';
          }
          return `<button class="${cls}" onclick="handleAnswer(${ch.id},this)">${ch.name}</button>`;
        }).join('')}
      </div>
      ${state.phase==='answered'&&state.result?`
        <div class="feedback">
          <div class="fb-left">
            <span class="fb-icon">${state.result.ok?'✓':'✗'}</span>
            <div>
              <div class="fb-msg ${state.result.ok?'ok':'no'}">${state.result.ok?'Correto!':'Errado'}</div>
              ${!state.result.ok?`<div class="fb-sub">Era: ${state.result.chordName}</div>`:''}
            </div>
          </div>
          ${state.result.ok?`<span class="fb-xp">+${state.result.gain} XP</span>`:''}
        </div>
        <button class="next-btn ${state.lvlUpPending?'highlight':''}" onclick="nextQ()">
          ${state.lvlUpPending?'Ver Level Up →':'Próximo →'}
        </button>
      `:''}
    </div>
  `;
}

function renderStart() {
  return `
    <div class="start-wrap">
      <div class="start-hero">
        <div style="font-size:3.5rem;margin-bottom:.5rem">🎸</div>
        <div class="start-title">Treine seu <span>Ouvido</span></div>
        <div class="start-desc">Ouça o acorde e identifique. Ganhe XP, mantenha sequências e suba de nível.</div>
        <button class="start-cta" onclick="startGame()">Começar Treino</button>
      </div>
      <div class="section-title">Níveis</div>
      <div class="levels-grid">
        ${LEVELS.map(l=>`<div class="lvl-pill"><div class="lvl-pill-n">Nível ${l.n}</div><div class="lvl-pill-name">${l.title}</div></div>`).join('')}
      </div>
    </div>`;
}

function renderLevelUp() {
  const lvl = LEVELS[getLvlIdx(state.xp)];
  return `
    <div class="lvlup-wrap">
      <div class="lvlup-badge">Level Up!</div>
      <div class="lvlup-title">Nível ${lvl.n}</div>
      <div class="lvlup-sub">${lvl.title}</div>
      <div style="font-size:4rem;margin:1rem 0">🎸🎉</div>
      <div class="lvlup-unlock">🔓 ${lvl.desc}</div>
      <div class="divider-line"></div>
      <button class="start-cta" onclick="afterLvlUp()">Continuar Treino →</button>
    </div>`;
}

function renderRanking() {
  const lvlIdx = getLvlIdx(state.xp);
  const data = [...MOCK_RANKING, {name:'Você',xp:state.xp,lvl:lvlIdx+1,isMe:true}].sort((a,b)=>b.xp-a.xp);
  return `
    <div style="width:100%;max-width:480px">
      <div class="section-title">Classificação Global</div>
      <div class="rank-card">
        ${data.map((p,i)=>`
          <div class="rank-row ${p.isMe?'me':''}">
            <span class="rank-pos ${i<3?'top':''}">${i+1}</span>
            <div class="rank-avatar">${p.name[0]}</div>
            <div class="rank-info">
              <div class="rank-name">${p.isMe?'Você':p.name}</div>
              <div class="rank-lvl">Nível ${p.lvl} — ${LEVELS[Math.min(p.lvl-1,5)].title}</div>
            </div>
            <span class="rank-xp">${p.xp} XP</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function startGame() {
  Object.assign(state,{xp:0,streak:0,score:0,stats:{t:0,c:0},result:null,lvlUpPending:false});
  genQ(); state.phase='question'; render();
}

function nextQ() {
  if (state.lvlUpPending) {
    playSfx('levelup');
    particles.push(...makeParticles(240,300,30,true));
    state.lvlUpPending=false; state.phase='levelup'; render(); return;
  }
  genQ(); state.phase='question'; render();
}

function afterLvlUp() { genQ(); state.phase='question'; render(); }

render();
</script>
</body>
</html>
