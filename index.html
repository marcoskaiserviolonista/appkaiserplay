<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaiserPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-120px) scale(.9)}}
@keyframes correctFlash{0%{background:#111}20%{background:#1a2e1a}100%{background:#111}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes bonusBurst{0%{transform:scale(1)}30%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pulse{from{opacity:.8}to{opacity:1;text-shadow:0 0 18px rgba(245,166,35,.9)}}
@keyframes scoreCount{0%{transform:scale(2);color:#F5A623}100%{transform:scale(1)}}
@keyframes borderGlow{0%,100%{box-shadow:4px 4px 0 #111,0 0 0 0 rgba(245,166,35,.3)}50%{box-shadow:4px 4px 0 #111,0 0 0 6px rgba(245,166,35,.2)}}
@keyframes lvlupEntrance{0%{opacity:0;transform:scale(.7) translateY(30px)}60%{transform:scale(1.04) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes xpPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.3) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes autoProgress{from{width:100%}to{width:0%}}

body{background:#111;color:#f0f0f0;font-family:'Poppins',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2rem;min-height:100vh;background:#111}
.app.flash-correct{animation:correctFlash .5s ease}

.header{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:1rem 0 .9rem;border-bottom:3px solid #222;margin-bottom:1rem}
.logo{display:flex;align-items:center;gap:.55rem}
.logo-icon{width:36px;height:36px;background:#F5A623;border-radius:10px;border:3px solid #1a1a1a;box-shadow:3px 3px 0 #1a1a1a;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.logo-text{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;color:#f0f0f0}
.logo-text span{color:#F5A623}
.header-tab{font-size:.72rem;font-weight:700;color:#888;cursor:pointer;padding:.35rem .75rem;border-radius:20px;border:2.5px solid transparent;transition:all .15s;letter-spacing:.03em;text-transform:uppercase}
.header-tab.active{color:#1a1a1a;background:#F5A623;border-color:#1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
.header-tab:hover:not(.active){color:#ddd;border-color:#333}

/* ── XP Bar ── */
.lvl-bar{width:100%;max-width:520px;background:#1e1e1e;border-radius:16px;padding:.85rem 1.1rem;margin-bottom:.75rem;border:3px solid #2a2a2a;box-shadow:4px 4px 0 #1a1a1a}
.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.lvl-name{font-size:.85rem;font-weight:700;color:#F5A623}
.lvl-xp{font-size:.75rem;color:#999;font-weight:600}
.xp-track{height:12px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a}
.xp-fill{height:100%;background:linear-gradient(90deg,#F5A623,#ffd166);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── Stats ── */
.stats{width:100%;max-width:520px;display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.75rem}
.stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem .5rem;text-align:center;box-shadow:4px 4px 0 #151515}
.stat-val{font-size:1.7rem;font-weight:900;color:#f0f0f0;line-height:1}
.stat-val.orange{color:#F5A623}
.stat-val.anim{animation:scoreCount .35s ease}
.stat-lbl{font-size:.6rem;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:.35rem}

/* ── Combo/Flame ── */
.combo-bar{width:100%;max-width:520px;margin-bottom:.75rem;background:#1a1200;border:3px solid #F5A623;border-radius:14px;box-shadow:4px 4px 0 #1a1a1a;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.75rem;animation:slideUp .2s ease}
.combo-flames{font-size:1.5rem;letter-spacing:-.1em;animation:flamePulse .6s ease-in-out infinite}
.combo-text{font-size:.9rem;font-weight:900;color:#F5A623;flex:1}
.combo-bonus{font-size:1rem;font-weight:900;color:#fff;background:#F5A623;border:2px solid #1a1a1a;border-radius:8px;padding:.2rem .6rem;box-shadow:2px 2px 0 #1a1a1a}

/* ── Play Area ── */
.play-area{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:1.5rem 1.25rem 1.25rem;margin-bottom:.75rem;box-shadow:5px 5px 0 #151515}
.play-area.shake{animation:wrongShake .35s ease}
.play-label{font-size:.65rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.14em;text-align:center;margin-bottom:.9rem}

.play-btn{display:block;width:100%;background:#F5A623;color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:4px 4px 0 #1a1a1a;cursor:pointer;transition:all .12s;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.play-btn:hover:not(:disabled){background:#fdb72a;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.play-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.play-btn:disabled{background:#2a2a2a;color:#555;border-color:#222;box-shadow:4px 4px 0 #111;cursor:not-allowed}
.play-btn.playing{background:#2a2a2a;color:#F5A623;border-color:#444}

.q-label{font-size:.65rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.14em;text-align:center;margin-bottom:.9rem;margin-top:1.3rem}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.choice{background:#252525;border:3px solid #333;color:#e8e8e8;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;padding:1.1rem .5rem;cursor:pointer;border-radius:16px;box-shadow:4px 4px 0 #1a1a1a;transition:all .12s;text-align:center}
.choice:hover:not(.locked){background:#2e2e2e;border-color:#F5A623;color:#fff;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.choice:active:not(.locked){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.choice.locked{cursor:default}
.choice.correct{background:#1a3d1a!important;border-color:#22c55e!important;color:#4ade80!important;box-shadow:4px 4px 0 #111!important;animation:bonusBurst .3s ease}
.choice.wrong{background:#3d1a1a!important;border-color:#ef4444!important;color:#f87171!important;box-shadow:4px 4px 0 #111!important}
.choice.dim{opacity:.2;box-shadow:none}

/* ── Feedback ── */
.feedback{margin-top:1rem;padding:1.1rem 1.2rem;background:#252525;border-radius:18px;border:3px solid #333;box-shadow:4px 4px 0 #151515;animation:slideUp .2s ease forwards}
.fb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.fb-left{display:flex;align-items:center;gap:.75rem}
.fb-icon{font-size:1.4rem}
.fb-msg{font-size:1rem;font-weight:900}
.fb-msg.ok{color:#4ade80}
.fb-msg.no{color:#f87171}
.fb-sub{font-size:.75rem;color:#aaa;margin-top:.15rem}
.fb-xp-big{font-size:2rem;font-weight:900;color:#F5A623;text-shadow:0 0 20px rgba(245,166,35,.6);animation:xpPop .4s cubic-bezier(.34,1.56,.64,1) forwards}

/* Auto-progress bar */
.auto-bar-wrap{margin-top:.75rem;height:4px;background:#333;border-radius:99px;overflow:hidden}
.auto-bar{height:100%;background:#F5A623;border-radius:99px;width:100%}
.auto-bar.running{animation:autoProgress 2s linear forwards}

/* ── Start Screen ── */
.start-wrap{width:100%;max-width:520px}
.start-hero{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;box-shadow:5px 5px 0 #151515}
.start-title{font-size:1.6rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem;color:#f0f0f0}
.start-title span{color:#F5A623}
.start-subtitle{font-size:.88rem;color:#888;margin-bottom:1.5rem;font-weight:500}
.start-cta{width:100%;background:#F5A623;color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:5px 5px 0 #1a1a1a;cursor:pointer;transition:all .12s;letter-spacing:.03em;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.start-cta:hover{background:#fdb72a;transform:translate(-2px,-2px);box-shadow:7px 7px 0 #1a1a1a}
.start-cta:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #1a1a1a}

/* Stats grid on start screen */
.user-stats{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:1rem}
.user-stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:.75rem}
.user-stat-icon{font-size:1.4rem}
.user-stat-val{font-size:1.3rem;font-weight:900;color:#F5A623;line-height:1}
.user-stat-lbl{font-size:.6rem;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}

/* ── Level Up ── */
.lvlup-wrap{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:2.5rem 1.5rem;text-align:center;box-shadow:5px 5px 0 #151515;animation:lvlupEntrance .5s cubic-bezier(.34,1.56,.64,1) forwards}
.lvlup-badge{display:inline-block;background:#F5A623;border:3px solid #1a1a1a;color:#1a1a1a;font-size:.68rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:99px;margin-bottom:1rem;box-shadow:3px 3px 0 #1a1a1a}
.lvlup-title{font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem;color:#f0f0f0}
.lvlup-sub{font-size:.9rem;color:#aaa;margin-bottom:.6rem}
.lvlup-unlock{display:inline-block;font-size:.8rem;color:#F5A623;background:#252525;border:2.5px solid #F5A623;border-radius:10px;padding:.45rem .9rem;margin-bottom:1.75rem;font-weight:700;box-shadow:3px 3px 0 #1a1a1a}
.divider-line{height:3px;background:#2a2a2a;border-radius:99px;margin:1rem 0}

/* ── Ranking ── */
.section-title{font-size:.62rem;font-weight:800;color:#999;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem}
.rank-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:20px;overflow:hidden;margin-bottom:1rem;box-shadow:5px 5px 0 #151515}
.rank-row{display:flex;align-items:center;gap:.85rem;padding:1rem 1.1rem;border-bottom:2px solid #252525;transition:background .15s}
.rank-row:last-child{border-bottom:none}
.rank-row:hover{background:#222}
.rank-row.me{background:#1f1a00;border-left:4px solid #F5A623}
.rank-pos{font-size:.85rem;font-weight:900;color:#444;width:22px;text-align:center}
.rank-pos.top{color:#F5A623}
.rank-avatar{width:36px;height:36px;border-radius:50%;background:#252525;border:2.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#aaa;flex-shrink:0}
.rank-info{flex:1}
.rank-name{font-size:.88rem;font-weight:700;color:#e8e8e8}
.rank-lvl{font-size:.68rem;color:#999;font-weight:500;margin-top:.1rem}
.rank-xp{font-size:.85rem;font-weight:800;color:#F5A623}

/* ── Particles / Floats ── */
#particle-canvas{position:fixed;top:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:999;width:520px;height:700px}
#xp-floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998}
.xp-float{position:absolute;font-weight:900;font-family:'Poppins',sans-serif;text-shadow:0 0 16px rgba(245,166,35,.9);animation:floatUp 1s ease forwards;white-space:nowrap}
</style>
</head>
<body>
<canvas id="particle-canvas" width="520" height="700"></canvas>
<div id="xp-floats"></div>
<div class="app" id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <span class="logo-text">Kaiser<span>Play</span></span>
    </div>
    <div style="display:flex;gap:.25rem">
      <div class="header-tab active" id="tab-game" onclick="setTab('game')">Treino</div>
      <div class="header-tab" id="tab-ranking" onclick="setTab('ranking')">Ranking</div>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
const CHORDS = [
  {id:0,  name:"Dó Maior",  midi:[48,52,55,60,64]},
  {id:1,  name:"Ré Maior",  midi:[50,57,62,66]},
  {id:2,  name:"Mi Maior",  midi:[40,47,52,56,59,64]},
  {id:3,  name:"Fá Maior",  midi:[41,48,53,57,60,65]},
  {id:4,  name:"Sol Maior", midi:[43,47,50,55,59,67]},
  {id:5,  name:"Lá Maior",  midi:[45,52,57,61,64]},
  {id:6,  name:"Si Maior",  midi:[47,54,59,63,66]},
  {id:7,  name:"Dó Menor",  midi:[48,55,60,63,67]},
  {id:8,  name:"Ré Menor",  midi:[50,57,62,65]},
  {id:9,  name:"Mi Menor",  midi:[40,47,52,55,59,64]},
  {id:10, name:"Fá Menor",  midi:[41,48,53,56,60,65]},
  {id:11, name:"Sol Menor", midi:[43,50,55,58,62,67]},
  {id:12, name:"Lá Menor",  midi:[45,52,57,60,64]},
  {id:13, name:"Si Menor",  midi:[47,54,59,62,66]},
  {id:14, name:"Dó Dom.7",  midi:[48,52,58,60,64]},
  {id:15, name:"Sol Dom.7", midi:[43,47,50,55,59,65]},
  {id:16, name:"Fá Dom.7",  midi:[41,48,51,57,60,65]},
  {id:17, name:"Ré Dom.7",  midi:[50,57,60,66]},
  {id:18, name:"Lá Dom.7",  midi:[45,52,55,61,64]},
];

const LEVELS = [
  {n:1, title:"Iniciante",     xpToNext:80,    pool:[0,3,4,5],             desc:"Acordes maiores básicos"},
  {n:2, title:"Aprendiz",      xpToNext:180,   pool:[0,1,2,3,4,5,6],       desc:"Todos os maiores"},
  {n:3, title:"Intermediário", xpToNext:350,   pool:[0,1,2,3,4,5,6,8,9,12],desc:"+ Acordes menores"},
  {n:4, title:"Avançado",      xpToNext:600,   pool:[...Array.from({length:14},(_,i)=>i)], desc:"Todos maiores e menores"},
  {n:5, title:"Expert",        xpToNext:1000,  pool:[...Array.from({length:14},(_,i)=>i),14,15,16], desc:"+ Dominante 7ª"},
  {n:6, title:"Mestre",        xpToNext:99999, pool:[...Array.from({length:19},(_,i)=>i)], desc:"Repertório completo"},
];

const MOCK_RANKING = [
  {name:"GuitarHero92",xp:4820,lvl:6},
  {name:"MusicMind",   xp:3210,lvl:5},
  {name:"ChordMaster", xp:2780,lvl:5},
  {name:"NoteNinja",   xp:1950,lvl:4},
  {name:"StringSage",  xp:1420,lvl:4},
];

const SAMPLE_NOTES = [40,43,45,48,50,53,55,57,59,62,64,67];

// ── Howler Audio ──────────────────────────────────────────────
const howls = {};
SAMPLE_NOTES.forEach(note => {
  howls[note] = new Howl({ src:[`sounds/note-${note}.ogg`], preload:true, volume:1.0 });
});

function midiToFreq(midi) { return 440 * Math.pow(2, (midi-69)/12); }
function nearestSample(midi) {
  return SAMPLE_NOTES.reduce((a,b) => Math.abs(b-midi)<Math.abs(a-midi)?b:a);
}

function playChord(chord) {
  if (state.playing) return;
  state.playing = true; render();
  chord.midi.forEach((midi, i) => {
    const sn = nearestSample(midi);
    setTimeout(() => { howls[sn].rate(midiToFreq(midi)/midiToFreq(sn)); howls[sn].play(); }, i*110);
  });
  setTimeout(() => { state.playing = false; render(); }, chord.midi.length*110+3000);
}

function playSfx(type) {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const t = ctx.currentTime;
  const map = {
    correct:[[523,0],[659,.1]],
    bonus:  [[523,0],[659,.07],[784,.14],[1047,.21]],
    levelup:[[392,0],[523,.1],[659,.2],[784,.3],[1047,.4]],
  };
  if (map[type]) {
    map[type].forEach(([freq,delay]) => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type==='correct'?'sine':'triangle'; o.frequency.value=freq;
      g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(.15,t+delay+.015);
      g.gain.exponentialRampToValueAtTime(.001,t+delay+.4);
      o.connect(g); g.connect(ctx.destination); o.start(t+delay); o.stop(t+delay+.5);
    });
  } else if (type==='wrong') {
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(220,t); o.frequency.exponentialRampToValueAtTime(110,t+.2);
    g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.25);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+.3);
  }
}

// ── Particles ─────────────────────────────────────────────────
let particles=[], _pid=0;
const canvas=document.getElementById('particle-canvas');
const ctx2d=canvas.getContext('2d');

function makeParticles(x,y,count,isBonus) {
  return Array.from({length:count},()=>({
    id:_pid++,x,y,
    vx:(Math.random()-.5)*(isBonus?20:14),
    vy:-(Math.random()*(isBonus?18:12)+4),
    size:Math.random()*(isBonus?12:8)+4,
    color:isBonus?["#F5A623","#FFD700","#fff","#ff9800"][Math.floor(Math.random()*4)]:["#F5A623","#22c55e","#fff"][Math.floor(Math.random()*3)],
    life:1,decay:Math.random()*.04+.02,shape:Math.random()>.5?'circle':'star',
  }));
}

function drawParticles() {
  ctx2d.clearRect(0,0,520,700);
  particles.forEach(p=>{
    ctx2d.save(); ctx2d.globalAlpha=p.life; ctx2d.fillStyle=p.color; ctx2d.translate(p.x,p.y);
    if(p.shape==='star'){
      ctx2d.beginPath();
      for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;i===0?ctx2d.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size):ctx2d.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size)}
      ctx2d.closePath();ctx2d.fill();
    } else {ctx2d.beginPath();ctx2d.arc(0,0,p.size/2,0,Math.PI*2);ctx2d.fill();}
    ctx2d.restore();
  });
  particles=particles.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.5,life:p.life-p.decay})).filter(p=>p.life>0);
  requestAnimationFrame(drawParticles);
}
drawParticles();

let _fid=0;
function spawnFloat(x,y,text,big) {
  const el=document.createElement('div');
  el.className='xp-float';
  el.style.left=(x-30)+'px'; el.style.top=(y-20)+'px';
  el.style.fontSize=big?'2.2rem':'1.1rem';
  el.style.color=big?'#FFD700':'#F5A623';
  el.textContent=text;
  document.getElementById('xp-floats').appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

// ── State ─────────────────────────────────────────────────────
function getLvlIdx(xp){let cum=0;for(let i=0;i<LEVELS.length-1;i++){cum+=LEVELS[i].xpToNext;if(xp<cum)return i;}return LEVELS.length-1;}
function getLvlStartXP(idx){return LEVELS.slice(0,idx).reduce((s,l)=>s+l.xpToNext,0);}

// Persistent stats (session)
const session = { total: 0, correct: 0 };

const state = {
  tab:'game', phase:'start',
  chord:null, choices:[], selected:null,
  xp:0, streak:0, score:0, result:null,
  stats:{t:0,c:0}, playing:false, lvlUpPending:false,
};

let autoTimer = null;

function getFlames(streak) {
  if (streak >= 10) return '🔥🔥🔥';
  if (streak >= 5)  return '🔥🔥';
  if (streak >= 3)  return '🔥';
  return '';
}

function getBonusLabel(streak) {
  if (streak >= 10) return '+20 XP bônus';
  if (streak >= 5)  return '+10 XP bônus';
  if (streak >= 3)  return '+5 XP bônus';
  return '';
}

function genQ() {
  const lIdx=getLvlIdx(state.xp);
  const pool=LEVELS[lIdx].pool.map(i=>CHORDS[i]);
  const ans=pool[Math.floor(Math.random()*pool.length)];
  const wrong=pool.filter(c=>c.id!==ans.id).sort(()=>Math.random()-.5).slice(0,3);
  state.chord=ans; state.choices=[ans,...wrong].sort(()=>Math.random()-.5);
  state.selected=null; state.result=null;
}

function handleAnswer(choiceId, btnEl) {
  if (state.selected!==null||state.phase!=='question') return;
  if (autoTimer) { clearTimeout(autoTimer); autoTimer=null; }

  state.selected=choiceId;
  const ok=choiceId===state.chord.id;
  const newStreak=ok?state.streak+1:0;
  state.streak=newStreak;
  state.stats.t++; session.total++;
  if(ok){state.stats.c++;session.correct++;}

  let gain=ok?10:0,bonus=0,msg=null;
  if(ok){
    if(newStreak>=10){bonus=20;msg=`Combo ×${newStreak}!`}
    else if(newStreak>=5){bonus=10;msg=`Sequência ×${newStreak}!`}
    else if(newStreak>=3){bonus=5;msg=`Sequência ×${newStreak}!`}
    gain+=bonus;
    state.score+=gain; state.xp+=gain;
    const lvlBefore=getLvlIdx(state.xp-gain);
    if(getLvlIdx(state.xp)>lvlBefore) state.lvlUpPending=true;
    playSfx(bonus>0?'bonus':'correct');
    const rect=btnEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const cl=(window.innerWidth-520)/2;
    particles.push(...makeParticles(cx-cl,cy,bonus>0?22:12,bonus>0));
    spawnFloat(cx,cy,`+${gain} XP`,bonus>0);
    document.getElementById('app').classList.add('flash-correct');
    setTimeout(()=>document.getElementById('app').classList.remove('flash-correct'),500);
  } else {
    playSfx('wrong');
    document.querySelector('.play-area')?.classList.add('shake');
    setTimeout(()=>document.querySelector('.play-area')?.classList.remove('shake'),400);
  }

  state.result={ok,gain,bonus,msg,chordName:state.chord.name};
  state.phase='answered';
  render();

  // Auto-advance after 2s
  autoTimer = setTimeout(()=>{ autoTimer=null; nextQ(); }, 2000);
}

function setTab(t){state.tab=t;render();}

function render() {
  document.getElementById('tab-game').className='header-tab'+(state.tab==='game'?' active':'');
  document.getElementById('tab-ranking').className='header-tab'+(state.tab==='ranking'?' active':'');
  const c=document.getElementById('content');
  if(state.tab==='ranking'){c.innerHTML=renderRanking();return;}
  if(state.phase==='start'){c.innerHTML=renderStart();return;}
  if(state.phase==='levelup'){c.innerHTML=renderLevelUp();return;}

  const lvlIdx=getLvlIdx(state.xp),lvl=LEVELS[lvlIdx];
  const lvlStart=getLvlStartXP(lvlIdx);
  const prog=Math.min((state.xp-lvlStart)/lvl.xpToNext,1)*100;
  const acc=state.stats.t>0?Math.round(state.stats.c/state.stats.t*100):0;
  const flames=getFlames(state.streak);
  const bonusLabel=getBonusLabel(state.streak);

  c.innerHTML=`
    <div class="lvl-bar">
      <div class="lvl-row">
        <span class="lvl-name">Nível ${lvl.n} · ${lvl.title}</span>
        <span class="lvl-xp">${state.xp-lvlStart} / ${lvl.xpToNext} XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${prog}%"></div></div>
    </div>

    ${flames?`
    <div class="combo-bar">
      <span class="combo-flames">${flames}</span>
      <span class="combo-text">${state.result?.msg||'Em chamas!'}</span>
      <span class="combo-bonus">${bonusLabel}</span>
    </div>`:''}

    <div class="stats">
      <div class="stat-card">
        <div class="stat-val orange ${state.phase==='answered'&&state.result?.ok?'anim':''}">${state.score}</div>
        <div class="stat-lbl">Pontos</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="${state.streak>=3?'color:#F5A623;text-shadow:0 0 12px rgba(245,166,35,.6)':''}">${state.streak}</div>
        <div class="stat-lbl">Sequência</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${acc}%</div>
        <div class="stat-lbl">Acertos</div>
      </div>
    </div>

    <div class="play-area">
      <div class="play-label">Ouça o acorde</div>
      <button class="play-btn ${state.playing?'playing':''}" onclick="if(!state.playing)playChord(state.chord)" ${state.playing?'disabled':''}>
        ${state.playing?'♪  Tocando...':'▶  Ouvir Acorde'}
      </button>
      <div class="q-label">Qual é este acorde?</div>
      <div class="choices">
        ${state.choices.map(ch=>{
          let cls='choice';
          if(state.phase==='answered'){
            cls+=' locked';
            if(ch.id===state.chord.id) cls+=' correct';
            else if(ch.id===state.selected) cls+=' wrong';
            else cls+=' dim';
          }
          return `<button class="${cls}" onclick="handleAnswer(${ch.id},this)">${ch.name}</button>`;
        }).join('')}
      </div>
      ${state.phase==='answered'&&state.result?`
        <div class="feedback">
          <div class="fb-top">
            <div class="fb-left">
              <span class="fb-icon">${state.result.ok?'✅':'❌'}</span>
              <div>
                <div class="fb-msg ${state.result.ok?'ok':'no'}">${state.result.ok?'Correto!':'Errado'}</div>
                ${!state.result.ok?`<div class="fb-sub">Era: <strong>${state.result.chordName}</strong></div>`:''}
              </div>
            </div>
            ${state.result.ok?`<div class="fb-xp-big">+${state.result.gain} XP</div>`:''}
          </div>
          <div class="auto-bar-wrap"><div class="auto-bar running"></div></div>
        </div>
      `:''}
    </div>
  `;
}

function renderStart() {
  const acc=session.total>0?Math.round(session.correct/session.total*100):0;
  const lvlIdx=getLvlIdx(state.xp);
  const rankingData=[...MOCK_RANKING,{name:'Você',xp:state.xp,isMe:true}].sort((a,b)=>b.xp-a.xp);
  const myPos=rankingData.findIndex(p=>p.isMe)+1;

  return `
    <div class="start-wrap">
      <div class="start-hero">
        <div style="font-size:3rem;margin-bottom:.4rem">🎸</div>
        <div class="start-title">Treine seu <span>Ouvido</span></div>
        <div class="start-subtitle">Identifique o nome dos acordes pelo seu som!</div>
        <button class="start-cta" onclick="startGame()">${state.xp>0?'Continuar Treino':'Começar Treino'}</button>
      </div>
      <div class="section-title">Suas Estatísticas</div>
      <div class="user-stats">
        <div class="user-stat-card">
          <span class="user-stat-icon">⭐</span>
          <div><div class="user-stat-val">${state.xp}</div><div class="user-stat-lbl">XP Total</div></div>
        </div>
        <div class="user-stat-card">
          <span class="user-stat-icon">🎯</span>
          <div><div class="user-stat-val">${acc}%</div><div class="user-stat-lbl">Taxa de Acerto</div></div>
        </div>
        <div class="user-stat-card">
          <span class="user-stat-icon">🎵</span>
          <div><div class="user-stat-val">${session.total}</div><div class="user-stat-lbl">Acordes Ouvidos</div></div>
        </div>
        <div class="user-stat-card">
          <span class="user-stat-icon">🏆</span>
          <div><div class="user-stat-val">#${myPos}</div><div class="user-stat-lbl">Colocação</div></div>
        </div>
      </div>
    </div>`;
}

function renderLevelUp() {
  const lvl=LEVELS[getLvlIdx(state.xp)];
  return `
    <div class="lvlup-wrap">
      <div class="lvlup-badge">Level Up!</div>
      <div class="lvlup-title">Nível ${lvl.n}</div>
      <div class="lvlup-sub">${lvl.title}</div>
      <div style="font-size:4rem;margin:1rem 0">🎸🎉</div>
      <div class="lvlup-unlock">🔓 ${lvl.desc}</div>
      <div class="divider-line"></div>
      <button class="start-cta" onclick="afterLvlUp()">Continuar Treino →</button>
    </div>`;
}

function renderRanking() {
  const lvlIdx=getLvlIdx(state.xp);
  const data=[...MOCK_RANKING,{name:'Você',xp:state.xp,lvl:lvlIdx+1,isMe:true}].sort((a,b)=>b.xp-a.xp);
  return `
    <div style="width:100%;max-width:520px">
      <div class="section-title">Classificação Global</div>
      <div class="rank-card">
        ${data.map((p,i)=>`
          <div class="rank-row ${p.isMe?'me':''}">
            <span class="rank-pos ${i<3?'top':''}">${i+1}</span>
            <div class="rank-avatar">${p.name[0]}</div>
            <div class="rank-info">
              <div class="rank-name">${p.isMe?'Você':p.name}</div>
              <div class="rank-lvl">Nível ${p.lvl||lvlIdx+1} — ${LEVELS[Math.min((p.lvl||lvlIdx+1)-1,5)].title}</div>
            </div>
            <span class="rank-xp">${p.xp} XP</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function startGame() {
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  Object.assign(state,{xp:0,streak:0,score:0,stats:{t:0,c:0},result:null,lvlUpPending:false});
  session.total=0; session.correct=0;
  genQ(); state.phase='question'; render();
}

function nextQ() {
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(state.lvlUpPending){
    playSfx('levelup');
    particles.push(...makeParticles(260,300,35,true));
    state.lvlUpPending=false; state.phase='levelup'; render(); return;
  }
  genQ(); state.phase='question'; render();
}

function afterLvlUp(){genQ();state.phase='question';render();}

render();
</script>
</body>
</html>
