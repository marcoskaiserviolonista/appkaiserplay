<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaiserPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Fredoka:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-120px) scale(.9)}}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) scale(1.4) rotate(20deg)}}
@keyframes coinBurst{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes correctFlash{0%{background:#111}20%{background:#1a2e1a}100%{background:#111}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes bonusBurst{0%{transform:scale(1)}30%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes xpPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.3) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes autoProgress{from{width:100%}to{width:0%}}
@keyframes lvlupEntrance{0%{opacity:0;transform:scale(.7) translateY(30px)}60%{transform:scale(1.04) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreCount{0%{transform:scale(2);color:#F5A623}100%{transform:scale(1)}}
@keyframes pulse{from{opacity:.8}to{opacity:1;text-shadow:0 0 18px rgba(245,166,35,.9)}}
@keyframes walletPop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}

body{background:#111;color:#f0f0f0;font-family:'Poppins',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2rem;min-height:100vh;background:#111}
.app.flash-correct{animation:correctFlash .5s ease}

/* ── Header ── */
.header{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:1rem 0 .9rem;border-bottom:3px solid #222;margin-bottom:1rem}
.logo-wrap{display:flex;align-items:center;gap:.5rem}
.logo-icon{width:34px;height:34px;background:#F5A623;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#111;font-size:1rem;font-weight:900}
.logo-text{font-size:1rem;font-weight:800;letter-spacing:-.02em}
.logo-text .kaiser{color:#999}
.logo-text .play{color:#F5A623}
.header-tabs{display:flex;gap:.25rem}
.tab{font-size:.72rem;font-weight:700;color:#888;cursor:pointer;padding:.35rem .75rem;border-radius:20px;border:2.5px solid transparent;transition:all .15s;letter-spacing:.03em;text-transform:uppercase;background:transparent}
.tab.active{color:#1a1a1a;background:#F5A623;border-color:#1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
.tab:hover:not(.active){color:#ddd;border-color:#333}

/* ── XP Bar ── */
.lvl-bar{width:100%;max-width:520px;background:#1e1e1e;border-radius:16px;padding:.85rem 1.1rem;margin-bottom:.75rem;border:3px solid #2a2a2a;box-shadow:4px 4px 0 #1a1a1a}
.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.lvl-name{font-size:.85rem;font-weight:700;color:#F5A623}
.lvl-xp{font-size:.75rem;color:#bbb;font-weight:600}
.xp-track{height:12px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a}
.xp-fill{height:100%;background:linear-gradient(90deg,#F5A623,#ffd166);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── Combo ── */
.combo-bar{width:100%;max-width:520px;margin-bottom:.75rem;background:#1a1200;border:3px solid #F5A623;border-radius:14px;box-shadow:4px 4px 0 #1a1a1a;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.75rem;animation:slideUp .2s ease}
.combo-flames{font-size:1.5rem;letter-spacing:-.1em;animation:flamePulse .6s ease-in-out infinite}
.combo-text{font-size:.9rem;font-weight:900;color:#F5A623;flex:1}
.combo-bonus{font-size:1rem;font-weight:900;color:#fff;background:#F5A623;border:2px solid #1a1a1a;border-radius:8px;padding:.2rem .6rem;box-shadow:2px 2px 0 #1a1a1a}

/* ── Stats ── */
.stats-grid{width:100%;max-width:520px;display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.75rem}
.stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem .5rem;text-align:center;box-shadow:4px 4px 0 #151515}
.stat-val{font-size:1.7rem;font-weight:900;color:#f0f0f0;line-height:1}
.stat-val.orange{color:#F5A623}
.stat-val.anim{animation:scoreCount .35s ease}
.stat-lbl{font-size:.6rem;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:.35rem}

/* ── Play Area ── */
.play-area{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:1.5rem 1.25rem 1.25rem;margin-bottom:.75rem;box-shadow:5px 5px 0 #151515}
.play-area.shake{animation:wrongShake .35s ease}
.label-sm{font-size:.65rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.14em;text-align:center;margin-bottom:.9rem}
.label-sm.mt{margin-top:1.3rem}

.play-btn{display:block;width:100%;background:#F5A623;color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:4px 4px 0 #1a1a1a;cursor:pointer;transition:all .12s;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.play-btn:hover:not(:disabled){background:#fdb72a;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.play-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.play-btn:disabled{background:#2a2a2a;color:#555;border-color:#222;box-shadow:4px 4px 0 #111;cursor:not-allowed}
.play-btn.playing{background:#c17d0a;color:#fff;border-color:#1a1a1a;box-shadow:4px 4px 0 #1a1a1a,0 0 18px rgba(197,125,10,.35)}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.choice{background:#252525;border:3px solid #333;color:#d4d4d4;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;padding:1.1rem .5rem;cursor:pointer;border-radius:16px;box-shadow:4px 4px 0 #1a1a1a;transition:all .12s;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.choice:hover:not(.locked){background:#2e2e2e;border-color:#F5A623;color:#fff;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.choice:active:not(.locked){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.choice.locked{cursor:default}
.choice.correct{background:#1a3d1a!important;border-color:#22c55e!important;color:#4ade80!important;box-shadow:4px 4px 0 #111!important;animation:bonusBurst .3s ease}
.choice.wrong{background:#3d1a1a!important;border-color:#ef4444!important;color:#f87171!important;box-shadow:4px 4px 0 #111!important}
.choice.dim{opacity:.2;box-shadow:none}

.feedback{margin-top:1rem;padding:1.1rem 1.2rem;background:#252525;border-radius:18px;border:3px solid #333;box-shadow:4px 4px 0 #151515;animation:slideUp .2s ease forwards}
.fb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.fb-left{display:flex;align-items:center;gap:.75rem}
.fb-icon{font-size:1.4rem}
.fb-msg{font-size:1rem;font-weight:900}
.fb-msg.ok{color:#4ade80}
.fb-msg.no{color:#f87171}
.fb-sub{font-size:.75rem;color:#bbb;margin-top:.15rem}
.fb-xp-big{font-size:2rem;font-weight:900;color:#F5A623;text-shadow:0 0 20px rgba(245,166,35,.6);animation:xpPop .4s cubic-bezier(.34,1.56,.64,1) forwards}
.auto-bar-wrap{margin-top:.75rem;height:4px;background:#333;border-radius:99px;overflow:hidden}
.auto-bar{height:100%;background:#F5A623;border-radius:99px}
.auto-bar.run{animation:autoProgress 2s linear forwards}

/* ── Start ── */
.start-hero{width:100%;max-width:520px;background:#1e1e1e;border:none;border-radius:22px;padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;box-shadow:none}
.start-title{font-size:1.6rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem;font-family:'Fredoka',sans-serif}

/* ── Profile Card ── */
.profile-card{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:20px;padding:1.1rem 1.2rem;margin-bottom:.75rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:1rem}
.profile-avatar{width:52px;height:52px;border-radius:14px;background:#F5A623;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#1a1a1a;flex-shrink:0;border:3px solid #1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:1rem;font-weight:800;color:#f0f0f0;line-height:1.2}
.profile-title{font-size:.75rem;color:#F5A623;font-weight:700;margin-top:.15rem}
.profile-xp-track{height:8px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a;margin-top:.55rem}
.profile-xp-fill{height:100%;background:linear-gradient(90deg,#F5A623,#ffd166);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.profile-xp-label{font-size:.6rem;color:#888;font-weight:600;margin-top:.3rem;text-align:right}
.profile-lvl-badge{background:#252525;border:2px solid #F5A62344;border-radius:10px;padding:.3rem .65rem;text-align:center;flex-shrink:0}
.profile-lvl-num{font-size:1.4rem;font-weight:900;color:#F5A623;line-height:1}
.profile-lvl-lbl{font-size:.55rem;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* ── Tela Níveis ── */
.nivel-list{width:100%;max-width:520px}
.nivel-group{margin-bottom:1rem}
.nivel-group-title{font-size:.62rem;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;padding-left:.25rem}
.nivel-row{display:flex;align-items:center;gap:.85rem;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:3px 3px 0 #151515;transition:all .12s}
.nivel-row.current{border-color:#F5A623;background:#1f1800;box-shadow:3px 3px 0 #F5A62333}
.nivel-row.done{opacity:.55}
.nivel-row.locked{opacity:.35}
.nivel-img{width:44px;height:44px;border-radius:10px;background:#252525;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden}
.nivel-img img{width:100%;height:100%;object-fit:contain}
.nivel-info{flex:1}
.nivel-name{font-size:.88rem;font-weight:800;color:#e8e8e8}
.nivel-range{font-size:.68rem;color:#888;font-weight:600;margin-top:.1rem}
.nivel-status{font-size:.72rem;font-weight:700;color:#555}
.nivel-status.done{color:#4ade80}
.nivel-status.current{color:#F5A623}
.start-title span{color:#F5A623}
.start-desc{font-size:.88rem;color:#bbb;margin-bottom:1.5rem;font-weight:400;line-height:1.65}
.cta-btn{width:100%;background:#F5A623;color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:5px 5px 0 #1a1a1a;cursor:pointer;transition:all .12s;letter-spacing:.03em;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.cta-btn:hover{background:#fdb72a;transform:translate(-2px,-2px);box-shadow:7px 7px 0 #1a1a1a}
.cta-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #1a1a1a}

.section-title{font-size:.62rem;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem;width:100%;max-width:520px}
.user-stats{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.75rem;width:100%;max-width:520px}
.user-stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:.75rem}
.us-icon{font-size:1.4rem}
.us-val{font-size:1.3rem;font-weight:900;color:#F5A623;line-height:1}
.us-lbl{font-size:.58rem;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}

.nav-grid{width:100%;max-width:520px;display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.nav-btn{width:100%;background:#252525;border:none;border-radius:14px;color:#e8e8e8;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;padding:1rem 1.25rem;cursor:pointer;transition:background .12s;display:grid;grid-template-columns:32px 1fr 32px;align-items:center;gap:.75rem}
.nav-btn:hover{background:#2e2e2e}
.nav-btn:active{background:#333}
.nav-btn.gold{color:#e8e8e8}
.nav-btn.muted{color:#e8e8e8}
.nav-btn img{width:32px;height:32px;object-fit:contain}
.nav-btn-label{text-align:center}

/* ── Loja ── */
.back-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;width:100%;max-width:520px}
.back-btn{background:#252525;border:3px solid #333;color:#bbb;border-radius:10px;padding:.4rem .8rem;cursor:pointer;font-size:.8rem;font-weight:700;font-family:'Poppins',sans-serif;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.page-title{font-size:1.1rem;font-weight:900}
.coin-badge{margin-left:auto;background:#1e1e1e;border:3px solid #F5A623;border-radius:10px;padding:.35rem .8rem;display:flex;align-items:center;gap:.4rem}
.coin-badge.pop{animation:walletPop .4s ease}

.wallet-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:1rem;width:100%;max-width:520px}
.wallet-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem;box-shadow:4px 4px 0 #151515;text-align:center}
.wallet-lbl{font-size:.6rem;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem}
.wallet-val{font-size:1.8rem;font-weight:900;line-height:1}
.wallet-sub{font-size:.65rem;color:#888;margin-top:.2rem}

.exchange-btn{width:100%;max-width:520px;background:linear-gradient(135deg,#F5A623,#ffd166);border:3px solid #1a1a1a;border-radius:16px;padding:1rem;margin-bottom:1rem;cursor:pointer;box-shadow:4px 4px 0 #1a1a1a;font-family:'Poppins',sans-serif;transition:all .12s}
.exchange-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.exchange-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.exchange-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.exchange-title{font-size:1rem;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.exchange-sub{font-size:.72rem;color:#fff;margin-top:.2rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.4)}

.loja-tip{width:100%;max-width:520px;background:#1a1200;border:2px solid rgba(245,166,35,.3);border-radius:14px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.8rem;color:#F5A623;font-weight:600}
.loja-item{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:18px;padding:1rem 1.1rem;margin-bottom:.65rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:1rem}
.item-icon{font-size:2rem;width:48px;height:48px;background:#252525;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-info{flex:1}
.item-name{font-size:.88rem;font-weight:800;color:#e8e8e8;margin-bottom:.2rem}
.item-desc{font-size:.72rem;color:#bbb}
.item-buy{background:#F5A623;border:2px solid #1a1a1a;border-radius:10px;padding:.45rem .8rem;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:900;font-size:.78rem;color:#fff;box-shadow:2px 2px 0 #1a1a1a;white-space:nowrap;flex-shrink:0;transition:all .1s;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.item-buy:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 #1a1a1a}

/* ── Desempenho ── */
.perf-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem 1.1rem;margin-bottom:.65rem;box-shadow:4px 4px 0 #151515;width:100%;max-width:520px}
.chord-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0}
.chord-row+.chord-row{border-top:1px solid #2a2a2a}

/* ── Level Up ── */
.lvlup-wrap{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:2.5rem 1.5rem;text-align:center;box-shadow:5px 5px 0 #151515;animation:lvlupEntrance .5s cubic-bezier(.34,1.56,.64,1) forwards}
.lvlup-badge{display:inline-block;background:#F5A623;border:3px solid #1a1a1a;color:#1a1a1a;font-size:.68rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:.35rem .9rem;border-radius:99px;margin-bottom:1rem;box-shadow:3px 3px 0 #1a1a1a}
.lvlup-title{font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.3rem}
.lvlup-sub{font-size:.9rem;color:#bbb;margin-bottom:.6rem}
.lvlup-unlock{display:inline-block;font-size:.8rem;color:#F5A623;background:#252525;border:2.5px solid #F5A623;border-radius:10px;padding:.45rem .9rem;margin-bottom:1.75rem;font-weight:700;box-shadow:3px 3px 0 #1a1a1a}

/* ── Ranking ── */
.rank-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:20px;overflow:hidden;margin-bottom:1rem;box-shadow:5px 5px 0 #151515;width:100%;max-width:520px}
.rank-row{display:flex;align-items:center;gap:.85rem;padding:1rem 1.1rem;border-bottom:2px solid #252525}
.rank-row:last-child{border-bottom:none}
.rank-row.me{background:#1f1a00;border-left:4px solid #F5A623}
.rank-pos{font-size:.85rem;font-weight:900;color:#444;width:22px;text-align:center}
.rank-pos.top{color:#F5A623}
.rank-avatar{width:36px;height:36px;border-radius:50%;background:#252525;border:2.5px solid #333;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:#bbb;flex-shrink:0}
.rank-info{flex:1}
.rank-name{font-size:.88rem;font-weight:700;color:#e8e8e8}
.rank-lvl{font-size:.68rem;color:#bbb;margin-top:.1rem}
.rank-xp{font-size:.85rem;font-weight:800;color:#F5A623}

/* ── Particles / Floats ── */
#pcanvas{position:fixed;top:0;left:50%;transform:translateX(-50%);pointer-events:none;z-index:999;width:520px;height:700px}
#floats{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998}
.xp-float{position:absolute;font-weight:900;font-family:'Poppins',sans-serif;text-shadow:0 0 16px rgba(245,166,35,.9);animation:floatUp 1s ease forwards;white-space:nowrap}
.coin-float{position:absolute;font-size:1.8rem;animation:coinFloat .9s ease forwards}

/* ── Gold Coin ── */
.gc{display:inline-flex;align-items:center;justify-content:center;width:1.2em;height:1.2em;background:radial-gradient(circle at 35% 35%,#ffe566,#F5A623 55%,#c47a00);border:2px solid #a36000;border-radius:50%;box-shadow:0 2px 0 #7a4500,inset 0 1px 2px rgba(255,255,255,.5);font-style:normal;font-size:.85em;vertical-align:middle;flex-shrink:0}
.gc::after{content:'$';font-weight:900;color:#a36000;font-size:.6em;font-family:'Poppins',sans-serif;line-height:1}
</style>
</head>
<body>
<canvas id="pcanvas" width="520" height="700"></canvas>
<div id="floats"></div>
<div class="app" id="app">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">▶</div>
      <div class="logo-text"><span class="kaiser">Kaiser</span><span class="play">Play</span></div>
    </div>
    <div class="header-tabs">
      <button class="tab active" id="tab-treino" onclick="setTab('game')">Treino</button>
      <button class="tab" id="tab-ranking" onclick="setTab('ranking')">Ranking</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────
const CHORDS = [
  {id:0,  name:"Dó Maior",  midi:[48,52,55,60,64,67]},
  {id:1,  name:"Ré Maior",  midi:[50,57,62,66]},
  {id:2,  name:"Mi Maior",  midi:[40,47,52,56,59,64]},
  {id:3,  name:"Fá Maior",  midi:[41,48,53,57,60,65]},
  {id:4,  name:"Sol Maior", midi:[43,47,50,55,59,67]},
  {id:5,  name:"Lá Maior",  midi:[45,52,57,61,64]},
  {id:6,  name:"Si Maior",  midi:[47,54,59,63,66]},
  {id:7,  name:"Dó Menor",  midi:[48,55,60,63,67]},
  {id:8,  name:"Ré Menor",  midi:[50,57,62,65]},
  {id:9,  name:"Mi Menor",  midi:[40,47,52,55,59,64]},
  {id:10, name:"Fá Menor",  midi:[41,48,53,56,60,65]},
  {id:11, name:"Sol Menor", midi:[43,50,55,58,62,67]},
  {id:12, name:"Lá Menor",  midi:[45,52,57,60,64]},
  {id:13, name:"Si Menor",  midi:[47,54,59,62,66]},
  {id:14, name:"Dó Dom.7",  midi:[48,52,58,60,64]},
  {id:15, name:"Sol Dom.7", midi:[43,47,50,55,59,65]},
  {id:16, name:"Fá Dom.7",  midi:[41,48,51,57,60,65]},
  {id:17, name:"Ré Dom.7",  midi:[50,57,60,66]},
  {id:18, name:"Lá Dom.7",  midi:[45,52,55,61,64]},
];

function _titleForLvl(n){
  if(n<=10)return"Aprendiz";
  if(n<=20)return"Estudante";
  if(n<=30)return"Bardo";
  if(n<=40)return"Trovador";
  if(n<=50)return"Virtuose";
  if(n<=60)return"Alquimista Harmônico";
  if(n<=70)return"Mago do Som";
  if(n<=80)return"Guardião das Cordas";
  if(n<=90)return"Arcanista da Harmonia";
  if(n<=99)return"Lenda da Música";
  return"Mestre Supremo";
}
function _poolForLvl(n){
  if(n<=10)return[0,3,4,5];
  if(n<=20)return[0,1,2,3,4,5,6];
  if(n<=40)return[0,1,2,3,4,5,6,8,9,12];
  if(n<=60)return Array.from({length:14},(_,i)=>i);
  if(n<=80)return[...Array.from({length:14},(_,i)=>i),14,15,16];
  return Array.from({length:19},(_,i)=>i);
}
// XP por nível n = 6 acertos × 10 XP × n = 60n
const LEVELS = Array.from({length:100},(_,i)=>{
  const n=i+1;
  return{n,title:_titleForLvl(n),xpToNext:n===100?999999:60*n,pool:_poolForLvl(n)};
});

const MOCK_RANKING = [
  {name:"GuitarHero92",xp:4820,lvl:6},
  {name:"MusicMind",   xp:3210,lvl:5},
  {name:"ChordMaster", xp:2780,lvl:5},
  {name:"NoteNinja",   xp:1950,lvl:4},
  {name:"StringSage",  xp:1420,lvl:4},
];

const LOJA_ITEMS = [
  {id:0,icon:'📖',nome:'A Arte Auditiva do Violão',    desc:'Como tirar músicas de ouvido',    preco:350},
  {id:1,icon:'🎵',nome:'Tablatura de Greensleeves',    desc:'Partitura completa + tab',         preco:120},
  {id:2,icon:'🎵',nome:'Tablatura de Romance de Amor', desc:'Partitura completa + tab',         preco:120},
  {id:3,icon:'📚',nome:'Dicionário de Acordes',        desc:'Mais de 200 acordes ilustrados',   preco:280},
  {id:4,icon:'📖',nome:'A Arte Harmônica do Violão',   desc:'Teoria harmônica aplicada',        preco:350},
  {id:5,icon:'🏷️',nome:'CUPOM 20% off — Plano Vitalício',desc:'Desconto exclusivo KaiserPlay', preco:500},
];

const SAMPLE_NOTES = [40,43,45,48,50,53,55,57,59,62,64,67];

// ── Howler ────────────────────────────────────────────────────
const howls = {};
SAMPLE_NOTES.forEach(n => {
  howls[n] = new Howl({src:[`sounds/note-${n}.ogg`],preload:true,volume:1.0});
});
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}
function nearestSample(m){return SAMPLE_NOTES.reduce((a,b)=>Math.abs(b-m)<Math.abs(a-m)?b:a);}

let _playTimer=null;
function playChord(chord){
  if(_playTimer){clearTimeout(_playTimer);_playTimer=null;}
  // Para apenas as amostras que este acorde usa
  chord.midi.forEach(midi=>{try{howls[nearestSample(midi)].stop();}catch(e){}});
  state.playing=true; render();
  chord.midi.forEach((midi,i)=>{
    const sn=nearestSample(midi);
    const ratio=midiToFreq(midi)/midiToFreq(sn);
    setTimeout(()=>{
      // Howler v2: play() retorna id, rate() aplicado ao id — não afeta outras notas em curso
      const id=howls[sn].play();
      if(Math.abs(ratio-1)>0.001) howls[sn].rate(ratio,id);
    },i*110);
  });
  _playTimer=setTimeout(()=>{_playTimer=null;state.playing=false;render();},chord.midi.length*110+3000);
}

function playSfx(type){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const t=ctx.currentTime;
  const map={
    correct:[[523,0],[659,.1]],
    bonus:  [[523,0],[659,.07],[784,.14],[1047,.21]],
    levelup:[[392,0],[523,.1],[659,.2],[784,.3],[1047,.4]],
  };
  if(map[type]){
    map[type].forEach(([freq,delay])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type==='correct'?'sine':'triangle';o.frequency.value=freq;
      g.gain.setValueAtTime(0,t+delay);g.gain.linearRampToValueAtTime(.15,t+delay+.015);
      g.gain.exponentialRampToValueAtTime(.001,t+delay+.4);
      o.connect(g);g.connect(ctx.destination);o.start(t+delay);o.stop(t+delay+.5);
    });
  }else if(type==='wrong'){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(110,t+.2);
    g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);
    o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+.3);
  }
}

function playCoinSfx(){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const t=ctx.currentTime;
  // série de "pings" de moeda
  [[1047,.0],[1319,.08],[1568,.16],[2093,.25],[1568,.34],[2093,.43]].forEach(([freq,delay],i)=>{
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t+delay);
    g.gain.linearRampToValueAtTime(.18,t+delay+.01);
    g.gain.exponentialRampToValueAtTime(.001,t+delay+.18);
    o.connect(g);g.connect(ctx.destination);o.start(t+delay);o.stop(t+delay+.2);
  });
}

// ── Particles ─────────────────────────────────────────────────
let particles=[];
const canvas=document.getElementById('pcanvas');
const ctx2d=canvas.getContext('2d');

function makeParticles(x,y,count,isBonus){
  return Array.from({length:count},()=>({
    x,y,
    vx:(Math.random()-.5)*(isBonus?20:14),
    vy:-(Math.random()*(isBonus?18:12)+4),
    size:Math.random()*(isBonus?12:8)+4,
    color:isBonus?["#F5A623","#FFD700","#fff","#ff9800"][Math.floor(Math.random()*4)]:["#F5A623","#22c55e","#fff"][Math.floor(Math.random()*3)],
    life:1,decay:Math.random()*.04+.02,
    shape:Math.random()>.5?'circle':'star',
  }));
}

function makeCoinParticles(x,y){
  return Array.from({length:12},(_,i)=>({
    x:x+(Math.random()-.5)*60,y,
    vx:(Math.random()-.5)*10,
    vy:-(Math.random()*14+6),
    size:14+Math.random()*8,
    color:'#F5A623',life:1,decay:.025,shape:'coin',
  }));
}

function drawParticles(){
  ctx2d.clearRect(0,0,520,700);
  particles.forEach(p=>{
    ctx2d.save();ctx2d.globalAlpha=p.life;ctx2d.fillStyle=p.color;ctx2d.translate(p.x,p.y);
    if(p.shape==='coin'){
      ctx2d.beginPath();ctx2d.ellipse(0,0,p.size/2,p.size/2.5,0,0,Math.PI*2);ctx2d.fill();
      ctx2d.fillStyle='rgba(255,255,255,.3)';ctx2d.font=`bold ${p.size*.7}px sans-serif`;
      ctx2d.textAlign='center';ctx2d.textBaseline='middle';ctx2d.fillText('🪙',0,0);
    }else if(p.shape==='star'){
      ctx2d.beginPath();
      for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;i===0?ctx2d.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size):ctx2d.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);}
      ctx2d.closePath();ctx2d.fill();
    }else{ctx2d.beginPath();ctx2d.arc(0,0,p.size/2,0,Math.PI*2);ctx2d.fill();}
    ctx2d.restore();
  });
  particles=particles.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.5,life:p.life-p.decay})).filter(p=>p.life>0);
  requestAnimationFrame(drawParticles);
}
drawParticles();

function spawnFloat(x,y,text,big){
  const el=document.createElement('div');
  el.className='xp-float';
  el.style.left=(x-30)+'px';el.style.top=(y-20)+'px';
  el.style.fontSize=big?'2.2rem':'1.1rem';
  el.style.color=big?'#FFD700':'#F5A623';
  el.textContent=text;
  document.getElementById('floats').appendChild(el);
  setTimeout(()=>el.remove(),1100);
}

function spawnCoinFloats(cx,cy,amount){
  for(let i=0;i<Math.min(amount,8);i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='coin-float';
      el.style.left=(cx-20+(Math.random()-.5)*80)+'px';
      el.style.top=(cy-20+(Math.random()-.5)*40)+'px';
      el.innerHTML="<i class='gc' style='width:1.6em;height:1.6em;font-size:1.4rem'></i>";
      document.getElementById('floats').appendChild(el);
      setTimeout(()=>el.remove(),1000);
    },i*60);
  }
}

// ── State ─────────────────────────────────────────────────────
function getLvlIdx(xp){let c=0;for(let i=0;i<LEVELS.length-1;i++){c+=LEVELS[i].xpToNext;if(xp<c)return i;}return LEVELS.length-1;}
function getLvlStartXP(idx){return LEVELS.slice(0,idx).reduce((s,l)=>s+l.xpToNext,0);}

const state={
  tab:'game',phase:'start',
  chord:null,choices:[],selected:null,
  xp:0,streak:0,bestStreak:0,score:0,result:null,
  stats:{t:0,c:0},
  chordStats:{}, // {chordId: {c:0,e:0}}
  playing:false,lvlUpPending:false,
  pontos:0,moedas:0,
  inventario:[],
  coinPopAnim:false,
};

let autoTimer=null;

function getFlames(s){if(s>=10)return'🔥🔥🔥';if(s>=5)return'🔥🔥';if(s>=3)return'🔥';return'';}
function getBonusLabel(s){if(s>=10)return'+20 XP bônus';if(s>=5)return'+10 XP bônus';if(s>=3)return'+5 XP bônus';return'';}
function getAcc(){return state.stats.t>0?Math.round(state.stats.c/state.stats.t*100):0;}

function genQ(){
  const lIdx=getLvlIdx(state.xp);
  const pool=LEVELS[lIdx].pool.map(i=>CHORDS[i]);
  const ans=pool[Math.floor(Math.random()*pool.length)];
  const wrong=pool.filter(c=>c.id!==ans.id).sort(()=>Math.random()-.5).slice(0,3);
  state.chord=ans;
  state.choices=[ans,...wrong].sort(()=>Math.random()-.5);
  state.selected=null;state.result=null;
}

function handleAnswer(choiceId,btnEl){
  if(state.selected!==null||state.phase!=='question')return;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}

  state.selected=choiceId;
  const ok=choiceId===state.chord.id;
  const ns=ok?state.streak+1:0;
  state.streak=ns;
  if(ns>state.bestStreak)state.bestStreak=ns;
  state.stats.t++;
  if(!state.chordStats[state.chord.id])state.chordStats[state.chord.id]={c:0,e:0};
  if(ok){state.stats.c++;state.chordStats[state.chord.id].c++;}
  else{state.chordStats[state.chord.id].e++;}

  let gain=ok?10:0,bonus=0,msg=null;
  if(ok){
    if(ns>=10){bonus=20;msg=`Combo ×${ns}!`}
    else if(ns>=5){bonus=10;msg=`Sequência ×${ns}!`}
    else if(ns>=3){bonus=5;msg=`Sequência ×${ns}!`}
    gain+=bonus;
    state.score+=gain;state.xp+=gain;state.pontos+=gain;
    const lvlBefore=getLvlIdx(state.xp-gain);
    if(getLvlIdx(state.xp)>lvlBefore)state.lvlUpPending=true;
    playSfx(bonus>0?'bonus':'correct');
    const rect=btnEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const cl=(window.innerWidth-520)/2;
    particles.push(...makeParticles(cx-cl,cy,bonus>0?22:12,bonus>0));
    spawnFloat(cx,cy,`+${gain} XP`,bonus>0);
    document.getElementById('app').classList.add('flash-correct');
    setTimeout(()=>document.getElementById('app').classList.remove('flash-correct'),500);
  }else{
    playSfx('wrong');
    document.querySelector('.play-area')?.classList.add('shake');
    setTimeout(()=>document.querySelector('.play-area')?.classList.remove('shake'),400);
  }
  state.result={ok,gain,bonus,msg,chordName:state.chord.name};
  state.phase='answered';
  render();
  autoTimer=setTimeout(()=>{autoTimer=null;nextQ();},2000);
}

function exchangePoints(btnEl){
  if(state.pontos<100)return;
  const gained=Math.floor(state.pontos/100)*10;
  state.pontos=0;
  state.moedas+=gained;
  playCoinSfx();
  // coin particles
  const rect=btnEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const cl=(window.innerWidth-520)/2;
  particles.push(...makeCoinParticles(cx-cl,cy));
  spawnCoinFloats(cx,cy,gained>0?6:3);
  spawnFloat(cx,cy-60,`+${gained} moedas`,true);
  render();
}

function setTab(t){state.tab=t;render();}

function render(){
  document.getElementById('tab-treino').className='tab'+(state.tab==='game'?' active':'');
  document.getElementById('tab-ranking').className='tab'+(state.tab==='ranking'?' active':'');
  const c=document.getElementById('content');
  if(state.tab==='ranking'){c.innerHTML=renderRanking();return;}
  if(state.phase==='start'){c.innerHTML=renderStart();return;}
  if(state.phase==='levelup'){c.innerHTML=renderLevelUp();return;}
  if(state.phase==='desempenho'){c.innerHTML=renderDesempenho();return;}
  if(state.phase==='loja'){c.innerHTML=renderLoja();return;}
  if(state.phase==='inventario'){c.innerHTML=renderInventario();return;}
  if(state.phase==='niveis'){c.innerHTML=renderNiveis();return;}
  c.innerHTML=renderGame();
}

// ── Render: Start ─────────────────────────────────────────────
function renderStart(){
  const acc=getAcc();
  const rankData=[...MOCK_RANKING,{name:'Você',xp:state.xp,isMe:true}].sort((a,b)=>b.xp-a.xp);
  const myPos=rankData.findIndex(p=>p.isMe)+1;
  const lIdx=getLvlIdx(state.xp);
  const lvl=LEVELS[lIdx];
  const lvlStart=getLvlStartXP(lIdx);
  const prog=Math.min((state.xp-lvlStart)/lvl.xpToNext,1)*100;
  const initials='MK';
  return `
    <div class="profile-card">
      <div class="profile-avatar" style="background:#252525;overflow:hidden;padding:0">
        <img src="${_titleForLvl(lvl.n).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}.png"
          style="width:100%;height:100%;object-fit:cover"
          onerror="this.style.display='none';this.parentElement.innerHTML='<span style=\'font-size:1.1rem;font-weight:900;color:#F5A623\'>${initials}</span>'"
          alt="${lvl.title}"/>
      </div>
      <div class="profile-info">
        <div class="profile-name">Marcos Kaiser</div>
        <div class="profile-title">${lvl.title}</div>
        <div class="profile-xp-track"><div class="profile-xp-fill" style="width:${prog}%"></div></div>
        <div class="profile-xp-label">${state.xp-lvlStart} / ${lvl.xpToNext} XP</div>
      </div>
      <div class="profile-lvl-badge">
        <div class="profile-lvl-num">${lvl.n}</div>
        <div class="profile-lvl-lbl">nível</div>
      </div>
    </div>
    <div class="start-hero">
      <img src="violao.png" style="width:72px;height:72px;margin-bottom:.5rem;object-fit:contain" alt="violão"/>
      <div class="start-title">Treine seu <span>Ouvido</span></div>
      <div class="start-desc">Identifique acordes pelo som, acumule pontos e desbloqueie conteúdos para evoluir no violão.</div>
      <button class="cta-btn" onclick="startGame()">
        ${state.xp>0?'Continuar Treino':'Começar Treino'}
      </button>
    </div>
    <div class="section-title">Suas Estatísticas</div>
    <div class="user-stats">
      <div class="user-stat-card"><span class="us-icon">⭐</span><div><div class="us-val">${state.xp}</div><div class="us-lbl">Pontos</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🎯</span><div><div class="us-val">${acc}%</div><div class="us-lbl">Taxa de Acerto</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🔥</span><div><div class="us-val">${state.bestStreak}</div><div class="us-lbl">Acertos Consecutivos</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🏆</span><div><div class="us-val">#${myPos}</div><div class="us-lbl">Colocação</div></div></div>
    </div>
    <div class="nav-grid">
      <button class="nav-btn" onclick="state.phase='desempenho';render()"><img src='desempenho.png'><span class="nav-btn-label">Meu Desempenho</span></button>
      <button class="nav-btn gold" onclick="state.phase='loja';render()"><img src='moeda.png'><span class="nav-btn-label">Loja</span></button>
      <button class="nav-btn muted" onclick="state.phase='inventario';render()"><img src='inventario.png'><span class="nav-btn-label">Inventário</span></button>
      <button class="nav-btn muted" onclick="state.phase='niveis';render()"><img src='niveis.png'><span class="nav-btn-label">Níveis</span></button>
    </div>
  `;
}

// ── Render: Game ──────────────────────────────────────────────
function renderGame(){
  const lIdx=getLvlIdx(state.xp),lvl=LEVELS[lIdx];
  const lvlStart=getLvlStartXP(lIdx);
  const prog=Math.min((state.xp-lvlStart)/lvl.xpToNext,1)*100;
  const acc=getAcc();
  const flames=getFlames(state.streak);
  const bonusLbl=getBonusLabel(state.streak);

  return `
    <div style="width:100%;max-width:520px;display:flex;align-items:center;margin-bottom:.75rem;gap:.75rem">
      <button class="back-btn" onclick="state.phase='start';render()">← Voltar</button>
    </div>
    <div class="lvl-bar">
      <div class="lvl-row">
        <span class="lvl-name">Nível ${lvl.n} · ${lvl.title}</span>
        <span class="lvl-xp">${state.xp-lvlStart} / ${lvl.xpToNext} XP</span>
      </div>
      <div class="xp-track"><div class="xp-fill" style="width:${prog}%"></div></div>
    </div>

    ${flames?`
    <div class="combo-bar">
      <span class="combo-flames">${flames}</span>
      <span class="combo-text">${state.result?.msg||'Em chamas!'}</span>
      <span class="combo-bonus">${bonusLbl}</span>
    </div>`:''}

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val orange ${state.phase==='answered'&&state.result?.ok?'anim':''}">${state.xp}</div>
        <div class="stat-lbl">Pontos</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="${state.streak>=3?'color:#F5A623;text-shadow:0 0 12px rgba(245,166,35,.6)':''}">${state.streak}</div>
        <div class="stat-lbl">Sequência</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${acc}%</div>
        <div class="stat-lbl">Acertos</div>
      </div>
    </div>

    <div class="play-area">
      <div class="label-sm">Ouça o acorde</div>
      <button class="play-btn ${state.playing?'playing':''}" onclick="playChord(state.chord)">
        ${state.playing?'♪  Tocando...':'▶  Ouvir Acorde'}
      </button>
      <div class="label-sm mt">Qual é este acorde?</div>
      <div class="choices">
        ${state.choices.map(ch=>{
          let cls='choice';
          if(state.phase==='answered'){
            cls+=' locked';
            if(ch.id===state.chord.id)cls+=' correct';
            else if(ch.id===state.selected)cls+=' wrong';
            else cls+=' dim';
          }
          return `<button class="${cls}" onclick="handleAnswer(${ch.id},this)">${ch.name}</button>`;
        }).join('')}
      </div>
      ${state.phase==='answered'&&state.result?`
        <div class="feedback">
          <div class="fb-top">
            <div class="fb-left">
              <span class="fb-icon">${state.result.ok?'✅':'❌'}</span>
              <div>
                <div class="fb-msg ${state.result.ok?'ok':'no'}">${state.result.ok?'Correto!':'Errado'}</div>
                ${!state.result.ok?`<div class="fb-sub">Era: <strong>${state.result.chordName}</strong></div>`:''}
              </div>
            </div>
            ${state.result.ok?`<div class="fb-xp-big">+${state.result.gain} XP</div>`:''}
          </div>
          <div class="auto-bar-wrap"><div class="auto-bar run"></div></div>
        </div>
      `:''}
    </div>
  `;
}

// ── Render: Level Up ──────────────────────────────────────────
function renderLevelUp(){
  const lvl=LEVELS[getLvlIdx(state.xp)];
  return `
    <div class="lvlup-wrap">
      <div class="lvlup-badge">Level Up!</div>
      <div class="lvlup-title">Nível ${lvl.n}</div>
      <div class="lvlup-sub">${lvl.title}</div>
      <div style="font-size:4rem;margin:1rem 0">🎸🎉</div>
      <div class="lvlup-unlock">🔓 ${lvl.desc}</div>
      <div style="height:3px;background:#2a2a2a;border-radius:99px;margin:1rem 0"></div>
      <button class="cta-btn" onclick="afterLvlUp()">Continuar Treino →</button>
    </div>`;
}

// ── Render: Desempenho ────────────────────────────────────────
function renderDesempenho(){
  const acc=getAcc();
  const chordList=Object.entries(state.chordStats).map(([id,v])=>({
    name:CHORDS[id].name,...v,total:v.c+v.e
  })).sort((a,b)=>b.e-a.e);
  const maiorErro=chordList[0];

  return `
    <div class="back-row">
      <button class="back-btn" onclick="state.phase='start';render()">← Voltar</button>
      <span class="page-title">Meu Desempenho</span>
    </div>
    <div class="section-title">Visão Geral</div>
    <div class="user-stats">
      <div class="user-stat-card"><span class="us-icon">⭐</span><div><div class="us-val">${state.xp}</div><div class="us-lbl">Pontos</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🎯</span><div><div class="us-val">${acc}%</div><div class="us-lbl">Taxa de Acerto</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🎵</span><div><div class="us-val">${state.stats.t}</div><div class="us-lbl">Acordes Ouvidos</div></div></div>
      <div class="user-stat-card"><span class="us-icon">✅</span><div><div class="us-val">${state.stats.c}</div><div class="us-lbl">Acordes Certos</div></div></div>
      <div class="user-stat-card"><span class="us-icon">❌</span><div><div class="us-val">${state.stats.t-state.stats.c}</div><div class="us-lbl">Acordes Errados</div></div></div>
      <div class="user-stat-card"><span class="us-icon">🔥</span><div><div class="us-val">${state.bestStreak}</div><div class="us-lbl">Acertos Consecutivos</div></div></div>
    </div>

    ${maiorErro?`
    <div class="section-title">Acorde que mais errou</div>
    <div class="perf-card" style="background:#2a1010;border-color:#ef4444;margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div style="display:flex;align-items:center;gap:.75rem">
          <span style="font-size:1.5rem">😓</span>
          <div>
            <div style="font-size:1.1rem;font-weight:900;color:#f87171">${maiorErro.name}</div>
            <div style="font-size:.72rem;color:#bbb">${maiorErro.e} erros · ${maiorErro.c} acertos</div>
          </div>
        </div>
        <div style="font-size:1.6rem;font-weight:900;color:#ef4444">${maiorErro.e}×</div>
      </div>
    </div>`:''}

    ${chordList.length>0?`
    <div class="section-title">Acertos e Erros por Acorde</div>
    <div class="perf-card">
      ${chordList.map((ch,i)=>{
        const pct=Math.round(ch.c/ch.total*100);
        return `<div class="chord-row">
          <span style="font-size:.88rem;font-weight:700;color:#e8e8e8;flex:1">${ch.name}</span>
          <span style="font-size:.78rem;color:#4ade80;font-weight:700;margin-right:.75rem">✓ ${ch.c}</span>
          <span style="font-size:.78rem;color:#f87171;font-weight:700;margin-right:.75rem">✗ ${ch.e}</span>
          <span style="font-size:.78rem;font-weight:900;color:${pct>=70?'#F5A623':'#888'}">${pct}%</span>
        </div>`;
      }).join('')}
    </div>`:'<div style="color:#555;text-align:center;padding:2rem 0;font-size:.9rem">Jogue para ver suas estatísticas! 🎸</div>'}
  `;
}

// ── Render: Loja ──────────────────────────────────────────────

  const podeConverter=state.pontos>=100;
  const ganharei=Math.floor(state.pontos/100)*10;
  return `
    <div class="back-row">
      <button class="back-btn" onclick="state.phase='start';render()">← Voltar</button>
      <span class="page-title"><img src='moeda.png' style='width:24px;height:24px;vertical-align:middle;margin-right:.3rem;object-fit:contain'> Loja</span>
      <div class="coin-badge">
        <img src='moeda.png' style='width:18px;height:18px;object-fit:contain'>
        <span style="font-size:.88rem;font-weight:900;color:#F5A623">${state.moedas}</span>
      </div>
    </div>

    <div class="wallet-grid">
      <div class="wallet-card">
        <div class="wallet-lbl">Pontos</div>
        <div class="wallet-val" style="color:#f0f0f0">${state.pontos}</div>
        <div class="wallet-sub">acumulados</div>
      </div>
      <div class="wallet-card">
        <div class="wallet-lbl">Moedas</div>
        <div class="wallet-val" style="color:#F5A623;display:flex;align-items:center;justify-content:center;gap:.35rem"><img src='bolsa.png' style='width:32px;height:32px;object-fit:contain'> ${state.moedas}</div>
        <div class="wallet-sub">em carteira</div>
      </div>
    </div>

    <button class="exchange-btn" onclick="exchangePoints(this)" ${!podeConverter?'disabled':''}>
      <div class="exchange-title">⚡ Trocar Pontos por Moedas</div>
      <div class="exchange-sub">
        ${podeConverter
          ? `100 pontos = <img src='moeda.png' style='width:14px;height:14px;vertical-align:middle'> 10 moedas · Você receberá <img src='moeda.png' style='width:14px;height:14px;vertical-align:middle'> ${ganharei}`
          : `Você precisa de pelo menos 100 pontos para trocar`}
      </div>
    </button>

    <div class="loja-tip">💡 Use suas moedas para desbloquear materiais exclusivos!</div>

    ${LOJA_ITEMS.map(item=>`
      <div class="loja-item">
        <div class="item-icon">${item.icon}</div>
        <div class="item-info">
          <div class="item-name">${item.nome}</div>
          <div class="item-desc">${item.desc}</div>
        </div>
        <button class="item-buy" onclick="comprarItem(${item.id})"><img src='moeda.png' style='width:14px;height:14px;vertical-align:middle;object-fit:contain'> ${item.preco}</button>
      </div>
    `).join('')}
  `;
}

// ── Render: Inventário ────────────────────────────────────────
function renderInventario(){
  return `
    <div class="back-row">
      <button class="back-btn" onclick="state.phase='start';render()">← Voltar</button>
      <span class="page-title">🎒 Inventário</span>
    </div>
    ${state.inventario.length===0
      ? `<div style="text-align:center;color:#555;padding:3rem 0;font-size:.9rem">Nenhum item ainda.<br/>Visite a Loja! <i class='gc'></i></div>`
      : state.inventario.map(id=>{
          const item=LOJA_ITEMS[id];
          return `<div class="loja-item">
            <div class="item-icon">${item.icon}</div>
            <div class="item-info">
              <div class="item-name">${item.nome}</div>
              <div class="item-desc">${item.desc}</div>
            </div>
            <button class="item-buy" style="background:#252525;border-color:#22c55e;color:#4ade80">⬇ Baixar</button>
          </div>`;
        }).join('')}
  `;
}

// ── Render: Níveis ───────────────────────────────────────────
const NIVEL_GROUPS = [
  {range:[1,10],  title:"Aprendiz"},
  {range:[11,20], title:"Estudante"},
  {range:[21,30], title:"Bardo"},
  {range:[31,40], title:"Trovador"},
  {range:[41,50], title:"Virtuose"},
  {range:[51,60], title:"Alquimista Harmônico"},
  {range:[61,70], title:"Mago do Som"},
  {range:[71,80], title:"Guardião das Cordas"},
  {range:[81,90], title:"Arcanista da Harmonia"},
  {range:[91,99], title:"Lenda da Música"},
  {range:[100,100],title:"Mestre Supremo"},
];

function renderNiveis(){
  const lIdx=getLvlIdx(state.xp);
  const currentLvl=LEVELS[lIdx].n;
  const groups=NIVEL_GROUPS.map(g=>{
    const [from,to]=g.range;
    let status='locked';
    if(currentLvl>to) status='done';
    else if(currentLvl>=from) status='current';
    return{...g,status};
  });
  return `
    <div class="back-row">
      <button class="back-btn" onclick="state.phase='start';render()">← Voltar</button>
      <span class="page-title">🏅 Níveis</span>
    </div>
    <div class="nivel-list">
      ${groups.map(g=>`
        <div class="nivel-row ${g.status}">
          <div class="nivel-img">
            <img src="${g.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_')}.png" onerror="this.parentElement.innerHTML='🎸'" alt="${g.title}"/>
          </div>
          <div class="nivel-info">
            <div class="nivel-name">${g.title}</div>
            <div class="nivel-range">Níveis ${g.range[0]}${g.range[1]!==g.range[0]?' – '+g.range[1]:''}</div>
          </div>
          <div class="nivel-status ${g.status}">
            ${g.status==='done'?'✓ Concluído':g.status==='current'?'▶ Atual':'🔒'}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Render: Ranking ───────────────────────────────────────────
function renderRanking(){
  const lvlIdx=getLvlIdx(state.xp);
  const data=[...MOCK_RANKING,{name:'Você',xp:state.xp,lvl:lvlIdx+1,isMe:true}].sort((a,b)=>b.xp-a.xp);
  return `
    <div class="section-title">Classificação Global</div>
    <div class="rank-card">
      ${data.map((p,i)=>`
        <div class="rank-row ${p.isMe?'me':''}">
          <span class="rank-pos ${i<3?'top':''}">${i+1}</span>
          <div class="rank-avatar">${p.name[0]}</div>
          <div class="rank-info">
            <div class="rank-name">${p.isMe?'Você':p.name}</div>
            <div class="rank-lvl">Nível ${p.lvl||lvlIdx+1} — ${LEVELS[Math.min((p.lvl||lvlIdx+1)-1,99)].title}</div>
          </div>
          <span class="rank-xp">${p.xp} XP</span>
        </div>`).join('')}
    </div>
  `;
}

// ── Actions ───────────────────────────────────────────────────
function startGame(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(state.xp===0){
    // Novo jogo: zera tudo
    Object.assign(state,{streak:0,bestStreak:0,score:0,stats:{t:0,c:0},chordStats:{},result:null,lvlUpPending:false,pontos:0,moedas:0,inventario:[]});
  } else {
    // Continuar: preserva XP, moedas, stats e inventário; reseta só o estado transitório
    Object.assign(state,{streak:0,score:0,result:null,lvlUpPending:false});
  }
  genQ();state.phase='question';render();
}

function nextQ(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(state.lvlUpPending){
    playSfx('levelup');
    particles.push(...makeParticles(260,300,35,true));
    state.lvlUpPending=false;state.phase='levelup';render();return;
  }
  genQ();state.phase='question';render();
  setTimeout(()=>playChord(state.chord),300);
}

function afterLvlUp(){genQ();state.phase='question';render();setTimeout(()=>playChord(state.chord),300);}

function comprarItem(id){
  const item=LOJA_ITEMS[id];
  if(state.moedas<item.preco){alert('Moedas insuficientes! 🪙');return;}
  if(state.inventario.includes(id)){alert('Você já possui este item!');return;}
  state.moedas-=item.preco;
  state.inventario.push(id);
  playCoinSfx();
  render();
}

render();
</script>
