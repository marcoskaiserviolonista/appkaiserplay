<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KaiserPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Fredoka:wght@600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-60px) scale(1.2)}100%{opacity:0;transform:translateY(-120px) scale(.9)}}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-100px) scale(1.4) rotate(20deg)}}
@keyframes coinBurst{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes correctFlash{0%{background:#111}20%{background:#1a2e1a}100%{background:#111}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes bonusBurst{0%{transform:scale(1)}30%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes xpPop{0%{transform:scale(0) rotate(-10deg);opacity:0}50%{transform:scale(1.3) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes autoProgress{from{width:100%}to{width:0%}}
@keyframes lvlupEntrance{0%{opacity:0;transform:scale(.7) translateY(30px)}60%{transform:scale(1.04) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes scoreCount{0%{transform:scale(2);color:#F5A623}100%{transform:scale(1)}}
@keyframes pulse{from{opacity:.8}to{opacity:1;text-shadow:0 0 18px rgba(245,166,35,.9)}}
@keyframes walletPop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes wrongFlash{0%{background:#111}15%{background:#3d0a0a}100%{background:#111}}
@keyframes xpBarFlash{0%{filter:brightness(1)}40%{filter:brightness(2.2)}100%{filter:brightness(1)}}
@keyframes xpFillGrow{0%{filter:brightness(1.4) saturate(1.5)}100%{filter:brightness(1) saturate(1)}}
@keyframes xpGlow{0%,100%{box-shadow:0 0 0px rgba(255,190,79,0)}50%{box-shadow:0 0 14px 4px rgba(255,190,79,.55)}}
@keyframes flyToBar{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:1;transform:translateY(-120px) scale(.85)}100%{opacity:0;transform:translateY(-160px) scale(.6)}}
@keyframes feedbackPop{0%{opacity:0;transform:scale(.5)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes streakPop{0%{transform:scale(1)}30%{transform:scale(1.5)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes correctExplode{0%{transform:scale(1)}25%{transform:scale(1.12)}60%{transform:scale(.96)}100%{transform:scale(1)}}
@keyframes diamondEntrance{0%{opacity:0;transform:scale(.4) rotate(-15deg)}60%{transform:scale(1.15) rotate(4deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes diamondPulse{0%,100%{box-shadow:0 0 0 0 rgba(96,220,255,.5)}50%{box-shadow:0 0 24px 8px rgba(96,220,255,.3)}}
@keyframes whoosh{0%{opacity:0;transform:translateX(-30px)}100%{opacity:1;transform:translateX(0)}}

body{background:#111;color:#f0f0f0;font-family:'Poppins',sans-serif;min-height:100vh}
.app{display:flex;flex-direction:column;align-items:center;padding:0 1rem 2rem;min-height:100vh;background:#111}
.app.flash-correct{animation:correctFlash .5s ease}
.app.flash-wrong{animation:wrongFlash .5s ease}

/* ── Header ── */
.header{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;padding:1rem 0 .9rem;border-bottom:3px solid #222;margin-bottom:1rem}
.logo-wrap{display:flex;align-items:center;gap:.5rem}
.logo-icon{width:34px;height:34px;background:#F5A623;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#111;font-size:1rem;font-weight:900}
.logo-text{font-size:1rem;font-weight:800;letter-spacing:-.02em}
.logo-text .kaiser{color:#999}
.logo-text .play{color:#F5A623}
.header-tabs{display:flex;gap:.25rem}
.tab{font-size:.8rem;font-weight:800;cursor:pointer;padding:.42rem 1rem;border-radius:20px;transition:all .18s;letter-spacing:.04em;text-transform:uppercase}
#tab-treino{color:#fff;background:linear-gradient(180deg,#f5c842 0%,#F5A623 100%);border:2.5px solid #111;box-shadow:3px 3px 0 #111;text-shadow:0 2px 5px rgba(0,0,0,.45)}
#tab-ranking{color:#fff;background:linear-gradient(180deg,#60a5fa 0%,#2563eb 100%);border:2.5px solid #111;box-shadow:3px 3px 0 #111}
#tab-treino:hover{filter:brightness(1.1)}
#tab-ranking:hover{filter:brightness(1.1)}

/* ── XP Bar ── */
.lvl-bar{width:100%;max-width:520px;background:#1e1e1e;border-radius:16px;padding:.85rem 1.1rem;margin-bottom:.75rem;border:3px solid #2a2a2a;box-shadow:4px 4px 0 #1a1a1a}
.lvl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.lvl-name{font-size:.85rem;font-weight:700;color:#F5A623}
.lvl-xp{font-size:.75rem;color:#bbb;font-weight:600}
.xp-track{height:12px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a}
.xp-fill{height:100%;background:linear-gradient(90deg,#e8931a,#ffbe4f,#ffd166);border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.xp-fill--animating{animation:xpGlow .5s ease-in-out infinite;filter:brightness(1.3) saturate(1.4)}

/* ── Combo ── */
.combo-bar{width:100%;max-width:520px;margin-bottom:.75rem;background:#1a1200;border:3px solid #F5A623;border-radius:14px;box-shadow:4px 4px 0 #1a1a1a;padding:.7rem 1.1rem;display:flex;align-items:center;gap:.75rem;animation:slideUp .2s ease}
.combo-flames{font-size:1.5rem;letter-spacing:-.1em;animation:flamePulse .6s ease-in-out infinite}
.combo-text{font-size:.9rem;font-weight:900;color:#F5A623;flex:1}
.combo-bonus{font-size:1rem;font-weight:900;color:#fff;background:#F5A623;border:2px solid #1a1a1a;border-radius:8px;padding:.2rem .6rem;box-shadow:2px 2px 0 #1a1a1a}

/* ── Stats ── */
.stats-grid{width:100%;max-width:520px;display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.75rem}
.stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem .5rem;text-align:center;box-shadow:4px 4px 0 #151515}
.stat-val{font-size:1.7rem;font-weight:900;color:#f0f0f0;line-height:1}
.stat-val.orange{color:#F5A623}
.stat-val.anim{animation:scoreCount .35s ease}
.stat-lbl{font-size:.6rem;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:.35rem}

/* ── Play Area ── */
.play-area{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:22px;padding:1.5rem 1.25rem 1.25rem;margin-bottom:.75rem;box-shadow:5px 5px 0 #151515}
.play-area.shake{animation:wrongShake .35s ease}
.label-sm{font-size:.65rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.14em;text-align:center;margin-bottom:.9rem}
.label-sm.mt{margin-top:1.3rem}

.play-btn{display:block;width:100%;background:linear-gradient(180deg,#ffbe4f 0%,#e8931a 100%);color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.04em;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:4px 4px 0 #1a1a1a;cursor:pointer;transition:all .12s;text-shadow:0 2px 6px rgba(0,0,0,.55)}
.play-btn:hover:not(:disabled){background:linear-gradient(180deg,#ffc85a 0%,#f0a020 100%);transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.play-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.play-btn:disabled{background:#2a2a2a;color:#555;border-color:#222;box-shadow:4px 4px 0 #111;cursor:not-allowed}
.play-btn.playing{background:linear-gradient(180deg,#d4920e 0%,#a86508 100%);color:#fff;border-color:#1a1a1a;box-shadow:4px 4px 0 #1a1a1a,0 0 18px rgba(197,125,10,.35)}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
.choice{background:linear-gradient(180deg,#1e2a42 0%,#111827 100%);border:3px solid #2a3a55;color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;padding:1.1rem .5rem;cursor:pointer;border-radius:16px;box-shadow:4px 4px 0 #0a0f1a;transition:all .12s;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.choice:hover:not(.locked){background:linear-gradient(180deg,#263352 0%,#161f33 100%);border-color:#F5A623;color:#fff;transform:translate(-2px,-2px);box-shadow:6px 6px 0 #0a0f1a}
.choice:focus{outline:none}
.choice:active:not(.locked){transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.choice.locked{cursor:default}
.choice.correct{background:#1a3d1a!important;border-color:#22c55e!important;color:#4ade80!important;box-shadow:4px 4px 0 #111!important;animation:bonusBurst .3s ease}
.choice.wrong{background:#3d1a1a!important;border-color:#ef4444!important;color:#f87171!important;box-shadow:4px 4px 0 #111!important}
.choice.dim{opacity:.2;box-shadow:none}

.fb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.fb-left{display:flex;align-items:center;gap:.75rem}
.fb-icon{font-size:1.4rem}
.fb-msg{font-size:1rem;font-weight:900}
.fb-msg.ok{color:#4ade80}
.fb-msg.no{color:#f87171}
.fb-sub{font-size:.75rem;color:#bbb;margin-top:.15rem}
.fb-xp-big{font-size:2rem;font-weight:900;color:#F5A623;text-shadow:0 0 20px rgba(245,166,35,.6);animation:xpPop .4s cubic-bezier(.34,1.56,.64,1) forwards}
.auto-bar-wrap{margin-top:.75rem;height:4px;background:#333;border-radius:99px;overflow:hidden}
.auto-bar{height:100%;background:#F5A623;border-radius:99px}
.auto-bar.run{animation:autoProgress 2s linear forwards}

/* ── Start ── */
.start-hero{width:100%;max-width:520px;background:#1e1e1e;border:none;border-radius:22px;padding:2rem 1.5rem;text-align:center;margin-bottom:1rem;box-shadow:none}
.start-title{font-size:1.6rem;font-weight:900;letter-spacing:-.03em;margin-bottom:.4rem;font-family:'Fredoka',sans-serif}

/* ── Profile Card ── */
.profile-card{width:100%;max-width:520px;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:20px;padding:1.1rem 1.2rem;margin-bottom:.75rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:1rem}
.profile-avatar{width:52px;height:52px;border-radius:14px;background:#F5A623;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#1a1a1a;flex-shrink:0;border:3px solid #1a1a1a;box-shadow:3px 3px 0 #1a1a1a}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:1rem;font-weight:800;color:#f0f0f0;line-height:1.2}
.profile-title{font-size:.75rem;color:#F5A623;font-weight:700;margin-top:.15rem}
.profile-xp-track{height:8px;background:#111;border-radius:99px;overflow:hidden;border:2px solid #2a2a2a;margin-top:.55rem}
.profile-xp-fill{height:100%;background:linear-gradient(90deg,#e8931a,#ffbe4f,#ffd166);border-radius:99px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.profile-xp-label{font-size:.6rem;color:#888;font-weight:600;margin-top:.3rem;text-align:right}
.profile-lvl-badge{background:#252525;border:2px solid #F5A62344;border-radius:10px;padding:.3rem .65rem;text-align:center;flex-shrink:0}
.profile-lvl-num{font-size:1.4rem;font-weight:900;color:#F5A623;line-height:1}
.profile-lvl-lbl{font-size:.55rem;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.08em}

/* ── Tela Níveis ── */
.nivel-list{width:100%;max-width:520px}
.nivel-group{margin-bottom:1rem}
.nivel-group-title{font-size:.62rem;font-weight:800;color:#bbb;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;padding-left:.25rem}
.nivel-row{display:flex;align-items:center;gap:.85rem;background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:.85rem 1rem;margin-bottom:.5rem;box-shadow:3px 3px 0 #151515;transition:all .12s}
.nivel-row.current{border-color:#F5A623;background:#1f1800;box-shadow:3px 3px 0 #F5A62333}
.nivel-row.done{opacity:.55}
.nivel-row.locked{opacity:.35}
.nivel-img{width:44px;height:44px;border-radius:0;background:transparent;border:none;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;overflow:hidden}
.nivel-img img{width:100%;height:100%;object-fit:contain}
.nivel-info{flex:1}
.nivel-name{font-size:.88rem;font-weight:800;color:#e8e8e8}
.nivel-range{font-size:.68rem;color:#888;font-weight:600;margin-top:.1rem}
.nivel-status{font-size:.72rem;font-weight:700;color:#555}
.nivel-status.done{color:#4ade80}
.nivel-status.current{color:#F5A623}
.start-title span{color:#F5A623}
.start-desc{font-size:.88rem;color:#bbb;margin-bottom:1.5rem;font-weight:400;line-height:1.65}
.cta-btn{width:100%;background:linear-gradient(180deg,#ffbe4f 0%,#e8931a 100%);color:#fff;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:800;padding:1.1rem;border:3px solid #1a1a1a;border-radius:16px;box-shadow:5px 5px 0 #1a1a1a;cursor:pointer;transition:all .12s;letter-spacing:.03em;text-shadow:0 2px 6px rgba(0,0,0,.4)}
.cta-btn:hover{background:#fdb72a;transform:translate(-2px,-2px);box-shadow:7px 7px 0 #1a1a1a}
.cta-btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 #1a1a1a}

.section-title{
display:flex;align-items:center;gap:.75rem;
width:100%;max-width:520px;
margin:.2rem 0 .9rem;
font-size:1rem;font-weight:900;
color:#fff;letter-spacing:.22em;text-transform:uppercase;
}
.section-title::before{
content:'';flex:1;height:1.5px;
background:linear-gradient(90deg,transparent,#F5A623);
}
.section-title::after{
content:'';flex:1;height:1.5px;
background:linear-gradient(90deg,#F5A623,transparent);
}
.user-stats{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:.75rem;width:100%;max-width:520px}
.user-stat-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem;box-shadow:4px 4px 0 #151515;display:flex;align-items:center;gap:.75rem}
.us-icon{font-size:1.4rem}
.us-val{font-size:1.3rem;font-weight:900;color:#F5A623;line-height:1}
.us-lbl{font-size:.58rem;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}

.nav-grid{width:100%;max-width:520px;display:flex;flex-direction:column;gap:.5rem;margin-bottom:.75rem}
.nav-btn{width:100%;background:linear-gradient(180deg,#2e2e2e,#1e1e1e);border:none;border-radius:14px;color:#e8e8e8;font-family:'Poppins',sans-serif;font-size:1rem;font-weight:700;padding:1rem 1.25rem;cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center;gap:.65rem;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.nav-btn:hover{background:linear-gradient(180deg,#383838,#282828)}
.nav-btn:active{background:linear-gradient(180deg,#222,#181818)}
.nav-btn.gold{color:#e8e8e8}
.nav-btn.muted{color:#e8e8e8}
.nav-btn img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.nav-btn-label{text-align:center}

/* ── Loja ── */
.back-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;width:100%;max-width:520px}
.back-btn{background:linear-gradient(180deg,#333,#222);border:3px solid #444;color:#fff;border-radius:10px;padding:.4rem .8rem;cursor:pointer;font-size:.8rem;font-weight:700;font-family:'Poppins',sans-serif;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.page-title{font-size:1.1rem;font-weight:900}
.coin-badge{margin-left:auto;background:#1e1e1e;border:3px solid #F5A623;border-radius:10px;padding:.35rem .8rem;display:flex;align-items:center;gap:.4rem}
.coin-badge.pop{animation:walletPop .4s ease}

.wallet-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem;margin-bottom:1rem;width:100%;max-width:520px}
.wallet-card{background:#1e1e1e;border:3px solid #2a2a2a;border-radius:16px;padding:1rem;box-shadow:4px 4px 0 #151515;text-align:center}
.wallet-lbl{font-size:.6rem;color:#bbb;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem}
.wallet-val{font-size:1.8rem;font-weight:900;line-height:1}
.wallet-sub{font-size:.65rem;color:#888;margin-top:.2rem}

.exchange-btn{width:100%;max-width:520px;background:linear-gradient(180deg,#ffbe4f 0%,#e8931a 100%);border:3px solid #1a1a1a;border-radius:16px;padding:1rem;margin-bottom:1rem;cursor:pointer;box-shadow:4px 4px 0 #1a1a1a;font-family:'Poppins',sans-serif;transition:all .12s}
.exchange-btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #1a1a1a}
.exchange-btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #1a1a1a}
.exchange-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.exchange-title{font-size:1rem;font-weight:900;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.exchange-sub{font-size:.72rem;color:#fff;margin-top:.2rem;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.4)}

.loja-tip{width:100%;max-width:520px;background:#1a1200;border:2px solid rgba(245,166,35,.3);border-radius:14px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.8rem;color:#F5A623;font-weight:600}

/* ── Shop Cards ─────────────────────────────── */

/* ── Inventário: slot grande do violão ── */
.inv-guitar-slot{
width:100%;max-width:520px;
background:#0e0e0e;
border:2.5px solid #232323;
border-radius:20px;
overflow:hidden;
padding:1rem 1rem .8rem;
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:.75rem;
}
.inv-guitar-img-wrap{
width:100%;
height:68vw;
max-height:360px;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(ellipse at 50% 55%,#1e1e1e 0%,#080808 100%);
border-radius:14px;
padding:1rem;
}
.inv-guitar-img{
height:100%;
width:auto;
max-width:100%;
object-fit:contain;
filter:drop-shadow(0 10px 28px rgba(0,0,0,.9));
}

.shop-cards-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:.75rem;
width:100%;
max-width:520px;
margin-bottom:.5rem;
}
.shop-card{
position:relative;
background:#0e0e0e;
border:2.5px solid #232323;
border-radius:16px;
overflow:hidden;
display:flex;
flex-direction:column;
cursor:pointer;
transition:border-color .2s, box-shadow .2s, transform .1s;
active-transform:scale(.97);
}
.shop-card:active{transform:scale(.97);}
.shop-card:hover{
border-color:#232323;
box-shadow:none;
}
.shop-card:focus,.shop-card:focus-visible{
outline:none;
border-color:#232323;
box-shadow:none;
}
.shop-card--equipped{
border-color:#232323;
box-shadow:none;
}
.shop-card--locked{ opacity:1; }
.shop-card-badge{
position:absolute;
top:.55rem;left:.55rem;
font-size:.68rem;font-weight:900;
padding:.22rem .55rem;
border-radius:20px;
z-index:3;
letter-spacing:.03em;
text-transform:uppercase;
box-shadow:0 2px 8px rgba(0,0,0,.7);
border:1.5px solid rgba(255,255,255,.12);
}
.shop-card-badge2{
position:absolute;
top:.55rem;right:.55rem;
font-size:.62rem;font-weight:900;
padding:.22rem .5rem;
border-radius:20px;
z-index:3;
letter-spacing:.03em;
background:linear-gradient(135deg,#1a0d2e,#2d1060);
color:#c084fc;
border:1.5px solid #7c3aed;
box-shadow:0 2px 10px rgba(124,58,237,.5);
}
.shop-card-equipped-tag{
position:absolute;
top:.55rem;right:.55rem;
font-size:.58rem;font-weight:900;
color:#111;
background:#22c55e;
padding:.18rem .5rem;
border-radius:20px;
z-index:3;
letter-spacing:.05em;
box-shadow:0 2px 8px rgba(0,0,0,.5);
}
.shop-card-img-wrap{
width:100%;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(ellipse at 50% 60%,#1e1e1e 0%,#0a0a0a 100%);

const CORDAS = [

const SAMPLE_NOTES = [40,43,45,48,50,53,55,57,59,62,64,67];

// ── AudioContext único compartilhado ──────────────────────────
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed'){
    _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}

const howls = {};
SAMPLE_NOTES.forEach(n => {
  howls[n] = new Howl({src:[`sounds/note-${n}.ogg`],preload:true,volume:1.0});
});
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}
function nearestSample(m){return SAMPLE_NOTES.reduce((a,b)=>Math.abs(b-m)<Math.abs(a-m)?b:a);}

let _playTimer=null;
function playChord(chord){
  if(_playTimer){clearTimeout(_playTimer);_playTimer=null;}

  chord.midi.forEach(midi=>{try{howls[nearestSample(midi)].stop();}catch(e){}});
  state.playing=true; render();
  chord.midi.forEach((midi,i)=>{
    const sn=nearestSample(midi);
    const ratio=midiToFreq(midi)/midiToFreq(sn);
    setTimeout(()=>{
      const id=howls[sn].play();
      if(Math.abs(ratio-1)>0.001) howls[sn].rate(ratio,id);
    },i*110);
  });
  _playTimer=setTimeout(()=>{_playTimer=null;state.playing=false;if(state.phase!=='answered')render();},chord.midi.length*110+3000);
}

function playSfx(type){
  try{
    const ctx=getAudioCtx();
    const t=ctx.currentTime;

    if(type==='correct'){
      [[523,.00,.13],[659,.09,.10]].forEach(([f,d,v])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(v,t+d+.012);
        g.gain.exponentialRampToValueAtTime(.001,t+d+.28);
        o.connect(g);g.connect(ctx.destination);o.start(t+d);o.stop(t+d+.32);
      });

    }else if(type==='correct2'){
      [[523,.00,'square',.06],[659,.08,'square',.05],[784,.16,'sine',.10],[1047,.22,'sine',.07]].forEach(([f,d,tp,v])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type=tp;o.frequency.value=f;
        g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(v,t+d+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+d+.32);
        o.connect(g);g.connect(ctx.destination);o.start(t+d);o.stop(t+d+.38);
      });

    }else if(type==='combo3'){
      const nc=ctx.createOscillator(),gc=ctx.createGain();
      nc.type='square';nc.frequency.setValueAtTime(1800,t);nc.frequency.exponentialRampToValueAtTime(200,t+.025);
      gc.gain.setValueAtTime(.08,t);gc.gain.exponentialRampToValueAtTime(.001,t+.03);
      nc.connect(gc);gc.connect(ctx.destination);nc.start(t);nc.stop(t+.03);
      [[523,.02],[659,.09],[784,.16],[1047,.23]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=f;
        g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.14,t+d+.012);
        g.gain.exponentialRampToValueAtTime(.001,t+d+.38);
        o.connect(g);g.connect(ctx.destination);o.start(t+d);o.stop(t+d+.44);
      });

    }else if(type==='combo6'){
      [[523,.00],[659,.055],[880,.11],[1175,.165],[1568,.22]].forEach(([f,d])=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='triangle';o.frequency.value=f;
        g.gain.setValueAtTime(0,t+d);g.gain.linearRampToValueAtTime(.17,t+d+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+d+.42);
        o.connect(g);g.connect(ctx.destination);o.start(t+d);o.stop(t+d+.5);
      });

// ── Particles ─────────────────────────────────────────────────
let particles=[];
const canvas=document.getElementById('pcanvas');
const ctx2d=canvas.getContext('2d');

function makeParticles(x,y,count,isBonus){
  return Array.from({length:count},()=>({
    x,y,
    vx:(Math.random()-.5)*(isBonus?20:14),
    vy:-(Math.random()*(isBonus?18:12)+4),
    size:Math.random()*(isBonus?12:8)+4,
    color:isBonus?["#F5A623","#FFD700","#fff","#ff9800"][Math.floor(Math.random()*4)]:["#F5A623","#22c55e","#fff"][Math.floor(Math.random()*3)],
    life:1,decay:Math.random()*.04+.02,
    shape:Math.random()>.5?'circle':'star',
  }));
}

function makeCoinParticles(x,y){
  return Array.from({length:12},(_,i)=>({
    x:x+(Math.random()-.5)*60,y,
    vx:(Math.random()-.5)*10,
    vy:-(Math.random()*14+6),
    size:14+Math.random()*8,
    color:'#F5A623',life:1,decay:.025,shape:'coin',
  }));
}

function drawParticles(){
  ctx2d.clearRect(0,0,520,700);
  particles.forEach(p=>{
    ctx2d.save();ctx2d.globalAlpha=p.life;ctx2d.fillStyle=p.color;ctx2d.translate(p.x,p.y);
    if(p.shape==='coin'){
      ctx2d.beginPath();ctx2d.ellipse(0,0,p.size/2,p.size/2.5,0,0,Math.PI*2);ctx2d.fill();
      ctx2d.fillStyle='rgba(255,255,255,.3)';ctx2d.font=`bold ${p.size*.7}px sans-serif`;
      ctx2d.textAlign='center';ctx2d.textBaseline='middle';ctx2d.fillText('🪙',0,0);
    }else if(p.shape==='star'){
      ctx2d.beginPath();
      for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;i===0?ctx2d.moveTo(Math.cos(a)*p.size,Math.sin(a)*p.size):ctx2d.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);}
      ctx2d.closePath();ctx2d.fill();
    }else{ctx2d.beginPath();ctx2d.arc(0,0,p.size/2,0,Math.PI*2);ctx2d.fill();}
    ctx2d.restore();
  });
  particles=particles.map(p=>({...p,x:p.x+p.vx,y:p.y+p.vy,vy:p.vy+.5,life:p.life-p.decay})).filter(p=>p.life>0);
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── State ─────────────────────────────────────────────────────
const LEVEL_XP_START=LEVELS.reduce((acc,l,i)=>{
  acc.push(i===0?0:acc[i-1]+LEVELS[i-1].xpToNext);
  return acc;
},[]);

function getLvlIdx(xp){
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVEL_XP_START[i])return i;}
  return 0;
}
function getLvlStartXP(idx){return LEVEL_XP_START[idx]||0;}

const state={
  tab:'game',phase:'start',
  chord:null,choices:[],selected:null,
  xp:0,xpDisplay:0,streak:0,bestStreak:0,score:0,result:null,
  stats:{t:0,c:0},
  chordStats:{},
  playing:false,lvlUpPending:false,
  pontos:1000,moedas:1000,diamantes:0,
  inventario:[],
  violaoEquipado:'violao_basico',
  cordasEquipadas:'cordas_basicas',
  violoesComprados:['violao_basico'],
  cordasCompradas:['cordas_basicas'],
  coinPopAnim:false,
  isBonus:false,
  questionCount:0,
};

let autoTimer=null;

function getFlames(s){if(s>=9)return'🔥🔥🔥';if(s>=6)return'🔥🔥';if(s>=3)return'🔥';return'';}
function getBonusLabel(s){if(s>=9)return'+20 XP bônus';if(s>=6)return'+12 XP bônus';if(s>=3)return'+5 XP bônus';if(s>=2)return'+2 XP bônus';return '';}
function getAcc(){return state.stats.t>0?Math.round(state.stats.c/state.stats.t*100):0;}

function genQ(){
  state.questionCount++;
  const threshold=Math.floor(Math.random()*5)+6;
  state.isBonus=(state.questionCount%threshold===0);

  let pool;
  if(state.isBonus){
    pool=CHORDS;
  } else {
    const lIdx=getLvlIdx(state.xp);
    pool=LEVELS[lIdx].pool.map(i=>CHORDS[i]);
  }
  const ans=pool[Math.floor(Math.random()*pool.length)];
  const wrong=pool.filter(c=>c.id!==ans.id).sort(()=>Math.random()-.5).slice(0,3);
  state.chord=ans;
  state.choices=[ans,...wrong].sort(()=>Math.random()-.5);
  state.selected=null;state.result=null;
}

function handleAnswer(choiceId,btnEl){
  if(state.selected!==null||state.phase!=='question')return;
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}

  state.selected=choiceId;
  const ok=choiceId===state.chord.id;
  const ns=ok?state.streak+1:0;
  state.streak=ns;
  if(ns>state.bestStreak)state.bestStreak=ns;
  saveStreak();
  state.stats.t++;
  if(!state.chordStats[state.chord.id])state.chordStats[state.chord.id]={c:0,e:0};
  if(ok){state.stats.c++;state.chordStats[state.chord.id].c++;}
  else{state.chordStats[state.chord.id].e++;}

  const violaoAtual=VIOLOES.find(v=>v.id===state.violaoEquipado)||VIOLOES[0];
  const violaoBonus=violaoAtual.bonus||0;
  const cordasAtual=state.cordasEquipadas?CORDAS.find(c=>c.id===state.cordasEquipadas):null;
  const cordasBonus=cordasAtual?cordasAtual.xpBonus||0:0;

  let gain=ok?10:0,bonus=0,msg=null,diamondGained=0;
  if(ok){
    if(state.isBonus){
      const diamGain=violaoAtual.doubleDiamonds?2:1;
      diamondGained=diamGain;state.diamantes+=diamGain;gain=25+violaoBonus;msg=violaoAtual.doubleDiamonds?'💎💎 Diamante Duplo!':'💎 Diamante!';
      playSfx('diamond');
    } else if(ns>=9){bonus=20;msg=`×${ns} Imparável!`;playSfx('combo9');}
    else if(ns>=6){bonus=12;msg=`×${ns} Em Chamas!`;playSfx('combo6');}
    else if(ns>=3){bonus=5;msg=`×${ns} Sequência!`;playSfx('combo3');}
    else if(ns>=2){bonus=2;msg=`×${ns} Combo!`;playSfx('correct2');}
    else{playSfx('correct');}
    if(!state.isBonus)gain+=bonus;
    gain+=violaoBonus+cordasBonus;
    const xpBefore=state.xp;
    state.score+=gain;state.xp+=gain;
    state.xpDisplay=xpBefore;
    if(!state.isBonus)state.pontos+=gain;
    const lvlBefore=getLvlIdx(state.xp-gain);
    if(getLvlIdx(state.xp)>lvlBefore)state.lvlUpPending=true;

    const rect=btnEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    const cl=(window.innerWidth-520)/2;
    btnEl.style.animation='correctExplode .4s ease';
    setTimeout(()=>{if(btnEl)btnEl.style.animation='';},400);
    const isBig=bonus>0||state.isBonus;
    particles.push(...makeParticles(cx-cl,cy,isBig?28:12,isBig));
    const app=document.getElementById('app');
    if(state.isBonus){
      app.style.transition='background .15s';app.style.background='#0a1a2e';
      setTimeout(()=>{app.style.background='';app.style.transition='';},500);
    }else{
      app.classList.add('flash-correct');
      setTimeout(()=>app.classList.remove('flash-correct'),500);
    }
    const color=state.isBonus?'#60dcff':'#F5A623';
    const xpPopup=document.createElement('div');
    xpPopup.textContent=(state.isBonus?'💎 ':'')+'+'+gain+' XP';
    xpPopup.style.cssText=`position:fixed;z-index:9999;left:${rect.left+rect.width/2}px;top:${rect.top}px;transform:translate(-50%,-100%);font-size:${isBig?'1.6rem':'1.25rem'};font-weight:900;color:${color};text-shadow:0 0 18px ${color},0 0 40px ${color}66;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(xpPopup);
    const okLabel=state.isBonus?'💎 Diamante!':'✓ Correto!';
    const okColor=state.isBonus?'#60dcff':'#4ade80';
    const okPopup=document.createElement('div');
    okPopup.textContent=okLabel;
    okPopup.style.cssText=`position:fixed;z-index:9998;left:${rect.left+rect.width/2}px;top:${rect.top+rect.height*.4}px;transform:translate(-50%,-50%);font-size:.95rem;font-weight:900;color:${okColor};text-shadow:0 0 12px ${okColor}88;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(okPopup);
    okPopup.animate([
      {opacity:0,transform:'translate(-50%,-10%) scale(.7)'},
      {opacity:1,transform:'translate(-50%,-50%) scale(1.05)',offset:.3},
      {opacity:1,transform:'translate(-50%,-55%) scale(1)',offset:.7},
      {opacity:0,transform:'translate(-50%,-80%) scale(.9)'}
    ],{duration:780,easing:'ease-out'}).onfinish=()=>okPopup.remove();
    xpPopup.animate([
      {opacity:0,transform:'translate(-50%,-60%) scale(.5)'},
      {opacity:1,transform:'translate(-50%,-120%) scale(1.2)',offset:.25},
      {opacity:1,transform:'translate(-50%,-130%) scale(1)',offset:.65},
      {opacity:0,transform:'translate(-50%,-160%) scale(.9)'}
    ],{duration:850,easing:'ease-out'}).onfinish=()=>{
      xpPopup.remove();
      animateXPGain(xpBefore, state.xp);
    };
  }else{
    state.pontos=Math.max(0,state.pontos-1);
    gain=-1;
    playSfx('wrong');
    const app=document.getElementById('app');
    app.classList.add('flash-wrong');
    setTimeout(()=>app.classList.remove('flash-wrong'),500);
    document.querySelector('.play-area')?.classList.add('shake');
    setTimeout(()=>document.querySelector('.play-area')?.classList.remove('shake'),400);
    const wrect=btnEl.getBoundingClientRect();
    const wx=wrect.left+wrect.width/2;
    const wrongXp=document.createElement('div');
    wrongXp.textContent='-1 XP';
    wrongXp.style.cssText=`position:fixed;z-index:9999;left:${wx}px;top:${wrect.top}px;transform:translate(-50%,-100%);font-size:1.2rem;font-weight:900;color:#f87171;text-shadow:0 0 14px #f8717188;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(wrongXp);
    const wrongLbl=document.createElement('div');
    wrongLbl.textContent='✗ Errado';
    wrongLbl.style.cssText=`position:fixed;z-index:9998;left:${wx}px;top:${wrect.top+wrect.height*.4}px;transform:translate(-50%,-50%);font-size:.92rem;font-weight:900;color:#f87171;text-shadow:0 0 10px #f8717166;pointer-events:none;white-space:nowrap;`;
    document.body.appendChild(wrongLbl);
    const errAnim=[
      {opacity:0,transform:'translate(-50%,-30%) scale(.6)'},
      {opacity:1,transform:'translate(-50%,-100%) scale(1.05)',offset:.3},
      {opacity:1,transform:'translate(-50%,-110%) scale(1)',offset:.65},
      {opacity:0,transform:'translate(-50%,-140%) scale(.85)'}
    ];
    wrongXp.animate(errAnim,{duration:750,easing:'ease-out'}).onfinish=()=>wrongXp.remove();
    wrongLbl.animate([
      {opacity:0,transform:'translate(-50%,-10%) scale(.7)'},
      {opacity:1,transform:'translate(-50%,-50%) scale(1.05)',offset:.3},
      {opacity:1,transform:'translate(-50%,-55%) scale(1)',offset:.7},
      {opacity:0,transform:'translate(-50%,-80%) scale(.9)'}
    ],{duration:700,easing:'ease-out'}).onfinish=()=>wrongLbl.remove();
  }
  state.result={ok,gain,bonus,msg,chordName:state.chord.name,diamondGained};
  state.phase='answered';
  render();
  autoTimer=setTimeout(()=>{autoTimer=null;nextQ();},1200);
}

function playEquipSfx(){
  try{
    const ctx=getAudioCtx();
    const t=ctx.currentTime;
    [[220,.08],[440,.06],[880,.05],[1320,.04]].forEach(([freq,vol],i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type= i<2 ? 'triangle' : 'sine';
      o.frequency.value=freq;
      g.gain.setValueAtTime(0,t+i*.055);
      g.gain.linearRampToValueAtTime(vol,t+i*.055+.018);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.055+.22);
      o.connect(g);g.connect(ctx.destination);
      o.start(t+i*.055);o.stop(t+i*.055+.25);
    });
    const buf=ctx.createBuffer(1,ctx.sampleRate*.04,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.008));
    const src=ctx.createBufferSource(),gn=ctx.createGain();
    gn.gain.value=.18;
    src.buffer=buf;src.connect(gn);gn.connect(ctx.destination);
    src.start(t);
  }catch(e){}
}

// ── Animação de ganho de XP ───────────────────────────────────
function playTickSfx(pitch){
  try{
    const ctx=getAudioCtx();
    const t=ctx.currentTime;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(pitch,t);
    o.frequency.exponentialRampToValueAtTime(pitch*1.4,t+.03);
    g.gain.setValueAtTime(.04,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.05);
    o.connect(g);g.connect(ctx.destination);
    o.start(t);o.stop(t+.06);
  }catch(e){}
}

function animateXPGain(fromXP, toXP){
  if(toXP<=fromXP) return;
  const duration=700;
  const start=performance.now();
  const fill=document.getElementById('xp-fill');
  const label=document.getElementById('xp-label');
  if(!fill||!label) return;

  fill.style.transition='none';
  fill.classList.add('xp-fill--animating');

  let lastTick=-1;
  const tickInterval=50;

  function step(now){
    const elapsed=now-start;
    const t=Math.min(elapsed/duration,1);
    const eased=1-Math.pow(1-t,3);
    const currentXP=Math.round(fromXP+(toXP-fromXP)*eased);

    state.xpDisplay=currentXP;

    const lIdx=getLvlIdx(currentXP);
    const lvlStart=getLvlStartXP(lIdx);
    const lvl=LEVELS[lIdx];
    const inLevel=Math.max(0,currentXP-lvlStart);
    label.textContent=`${inLevel} / ${lvl.xpToNext} XP`;
    const prog=Math.min((currentXP-lvlStart)/lvl.xpToNext,1)*100;
    fill.style.width=prog+'%';

    const tickIndex=Math.floor(elapsed/tickInterval);
    if(tickIndex!==lastTick){
      lastTick=tickIndex;
      playTickSfx(500+eased*700);
    }

    if(t<1){
      requestAnimationFrame(step);
    } else {
      state.xpDisplay=toXP;
      fill.style.transition='width .8s cubic-bezier(.4,0,.2,1)';
      fill.classList.remove('xp-fill--animating');
      fill.style.animation='xpBarFlash .4s ease';
      setTimeout(()=>{if(fill)fill.style.animation='';},400);
    }
  }
  requestAnimationFrame(step);
}

// ── Modal de Nível ────────────────────────────────────────────
let nivelModal=null;
function openNivelModal(idx){
  closeNivelModal();
  const g=NIVEL_GROUPS[idx];
  const lIdx=getLvlIdx(state.xp);
  const currentLvl=LEVELS[lIdx].n;
  const [from,to]=g.range;
  let status='locked';
  if(currentLvl>to) status='done';
  else if(currentLvl>=from) status='current';

  const img=_nivelImg(g.title);
  const cor=g.cor;
  const xpNeeded=LEVEL_XP_START[from-1];
  const isDone=status==='done';
  const isCurrent=status==='current';
  const isLocked=status==='locked';

  // Progresso dentro do grupo atual
  let progressBar='';
  if(isCurrent){
    const groupStart=LEVEL_XP_START[from-1];
    const groupEnd=to===100?999999:LEVEL_XP_START[to];
    const pct=Math.min(Math.round((state.xp-groupStart)/(groupEnd-groupStart)*100),100);
    progressBar=`
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;color:#bbb;margin-bottom:.4rem">
          <span>Progresso nesta etapa</span><span style="color:${cor};font-weight:800">${pct}%</span>

        <div style="height:8px;background:#1a1a1a;border-radius:99px;overflow:hidden;border:1.5px solid #2a2a2a">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${cor}88,${cor});border-radius:99px;transition:width .6s ease"></div>
        </div>
      </div>`;
  }

  const statusTag=isDone
    ? `<div style="display:inline-flex;align-items:center;gap:.4rem;background:#14521433;border:1.5px solid #22c55e55;border-radius:20px;padding:.3rem .8rem;font-size:.78rem;font-weight:800;color:#4ade80;margin-bottom:.9rem">✓ Etapa Concluída</div>`
    : isCurrent
    ? `<div style="display:inline-flex;align-items:center;gap:.4rem;background:${cor}18;border:1.5px solid ${cor}55;border-radius:20px;padding:.3rem .8rem;font-size:.78rem;font-weight:800;color:${cor};margin-bottom:.9rem">▶ Etapa Atual</div>`

  const overlay=document.createElement('div');
  overlay.id='nivel-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:8000;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;';
  overlay.onclick=e=>{if(e.target===overlay)closeNivelModal();};

  overlay.innerHTML=`

      <!-- fechar -->
      <button onclick="closeNivelModal()" style="position:fixed;top:1rem;right:1rem;z-index:9001;background:rgba(10,10,10,.95);border:1.5px solid #3a3a3a;border-radius:50%;width:40px;height:40px;color:#ccc;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">✕</button>

      <!-- imagem grande -->
      <div style="width:100%;background:radial-gradient(ellipse at 50% 45%,#1e1a10 0%,#080808 100%);display:flex;align-items:center;justify-content:center;padding:3.5rem 0 2rem;flex-shrink:0;border-bottom:2px solid ${cor}22;position:relative;">
        ${isLocked?`<div style="position:absolute;inset:0;background:#08080888;display:flex;align-items:center;justify-content:center;font-size:4rem;z-index:2">🔒</div>`:''}
        <img src="${img}" style="height:55vh;width:auto;max-width:90%;object-fit:contain;filter:drop-shadow(0 20px 60px rgba(0,0,0,1)) drop-shadow(0 0 40px ${cor}33)${isLocked?';filter:brightness(.35) grayscale(.5)':''}"
          onerror="this.style.display='none'">
      </div>

      <!-- painel info -->
      <div style="flex:1;background:#0e0e0e;padding:1.5rem 1.3rem 3rem;border-top:2.5px solid ${cor}33;">
        ${statusTag}
        <div style="font-size:1.6rem;font-weight:900;color:${isLocked?'#555':cor};margin-bottom:.25rem;letter-spacing:-.02em">${g.title}</div>
        <div style="font-size:.82rem;color:#666;font-weight:700;margin-bottom:.85rem">
          Níveis ${g.range[0]}${g.range[1]!==g.range[0]?' – '+g.range[1]:''}
        </div>
        <div style="font-size:.9rem;color:${isLocked?'#444':'#aaa'};line-height:1.7;margin-bottom:1.1rem;font-style:italic">"${g.desc}"</div>
        ${progressBar}
        ${!isDone&&!isCurrent?`<div style="font-size:.8rem;color:#555;display:flex;align-items:center;gap:.4rem">⭐ XP necessário: <strong style="color:#666">${xpNeeded.toLocaleString()} XP</strong></div>`:''}
        ${isDone?`<div style="font-size:.8rem;color:#4ade8088;display:flex;align-items:center;gap:.4rem">✓ Você já superou esta etapa da jornada.</div>`:''}
      </div>
    </div>`;

  document.body.appendChild(overlay);
  nivelModal=overlay;
  playClickSfx('soft');
}
function closeNivelModal(){
  if(nivelModal){nivelModal.remove();nivelModal=null;}
}

// ── Render: Ranking ───────────────────────────────────────────
function renderRanking(){
  const lvlIdx=getLvlIdx(state.xp);
  const data=[...MOCK_RANKING,{name:'Você',xp:state.xp,lvl:lvlIdx+1,isMe:true}].sort((a,b)=>b.xp-a.xp);
  return `
    <div class="section-title">Classificação Global</div>
    <div class="rank-card">
      ${data.map((p,i)=>`
        <div class="rank-row ${p.isMe?'me':''}">
          <span class="rank-pos ${i<3?'top':''}">${i+1}</span>
          <div class="rank-avatar">${p.name[0]}</div>
          <div class="rank-info">
            <div class="rank-name">${p.isMe?'Você':p.name}</div>
            <div class="rank-lvl">Nível ${p.lvl||lvlIdx+1} — ${LEVELS[Math.min((p.lvl||lvlIdx+1)-1,99)].title}</div>
          </div>
          <span class="rank-xp">${p.xp} XP</span>
        </div>`).join('')}
    </div>
  `;
}

// ── Actions ───────────────────────────────────────────────────
function startGame(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(state.xp===0){
    Object.assign(state,{streak:0,bestStreak:0,score:0,stats:{t:0,c:0},chordStats:{},result:null,lvlUpPending:false,pontos:1000,moedas:1000,inventario:[],violoesComprados:['violao_basico'],cordasCompradas:['cordas_basicas'],violaoEquipado:'violao_basico',cordasEquipadas:'cordas_basicas',xpDisplay:0});
  } else {
    Object.assign(state,{score:0,result:null,lvlUpPending:false});
  }
  genQ();state.phase='question';render();
}

function nextQ(){
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}
  if(!['answered','question','levelup'].includes(state.phase)) return;
  if(state.lvlUpPending){
    playSfx('levelup');
    particles.push(...makeParticles(260,300,35,true));
    state.lvlUpPending=false;state.phase='levelup';render();return;
  }
  genQ();state.phase='question';render();
  if(state.isBonus){
    playSfx('diamond');
    const app=document.getElementById('app');
    app.style.transition='box-shadow .2s';
    app.style.boxShadow='inset 0 0 60px rgba(96,220,255,.15)';
    setTimeout(()=>{app.style.boxShadow='';app.style.transition='';},1200);
  }
  setTimeout(()=>playChord(state.chord),300);
}

function afterLvlUp(){genQ();state.phase='question';render();if(state.isBonus){playSfx('diamond');}setTimeout(()=>playChord(state.chord),300);}

function comprarItem(id){
  const item=LOJA_ITEMS[id];
  if(state.moedas<item.preco){showToast('Moedas insuficientes!','Você precisa de 🪙 '+item.preco+' moedas');return;}
  if(state.inventario.includes(id)){showToast('Item já adquirido','Confira no seu Inventário');return;}
  state.moedas-=item.preco;
  state.inventario.push(id);
  playBuySfx();
  showToast('Item adicionado ao Inventário!',item.nome);
  render();
}

// ── Persistência de streak via localStorage ───────────────────
function saveStreak(){
  try{localStorage.setItem('kp_streak',state.streak);
      localStorage.setItem('kp_bestStreak',state.bestStreak);}catch(e){}
}
function loadStreak(){
  try{
    const s=parseInt(localStorage.getItem('kp_streak')||'0');
    const b=parseInt(localStorage.getItem('kp_bestStreak')||'0');
    if(s>0){state.streak=s;}
    if(b>0){state.bestStreak=b;}
  }catch(e){}
}
loadStreak();

// ── Modal da loja ─────────────────────────────────────────────
let shopModal=null;
function openShopModal(type,id){
  closeShopModal();
  let item,btnHtml,imgSrc,cor,nameTxt,benefits=[];
  if(type==='violao'){
    item=VIOLOES.find(v=>v.id===id);if(!item)return;
    cor=item.cor; imgSrc=item.img; nameTxt=item.nome;
    if(item.bonus>0) benefits.push({icon:'⭐',text:`+${item.bonus} XP a cada resposta correta`,color:cor});
    else benefits.push({icon:'🎸',text:'Violão padrão · sem bônus de XP',color:'#555'});
    if(item.doubleDiamonds) benefits.push({icon:'💎',text:'Dobra os diamantes recebidos',color:'#c084fc'});
    const owned=state.violoesComprados.includes(id);
    const equipped=state.violaoEquipado===id;
    const canBuy=!owned&&state.moedas>=item.preco;
    if(equipped) btnHtml=`<button class="modal-btn modal-btn--equipped">✓ Equipado</button>`;
    else if(owned) btnHtml=`<button class="modal-btn modal-btn--equip" onclick="equiparViolao('${id}');closeShopModal()">Equipar</button>`;
    else if(canBuy) btnHtml=`<button class="modal-btn modal-btn--buy" onclick="comprarViolao('${id}');closeShopModal()"><img src='moeda.png' style='width:14px;height:14px;vertical-align:middle;object-fit:contain'> ${item.preco.toLocaleString()}</button>`;
    else btnHtml=`<button class="modal-btn modal-btn--locked" disabled><img src='moeda.png' style='width:14px;height:14px;vertical-align:middle;object-fit:contain'> ${item.preco.toLocaleString()} · Saldo insuficiente</button>`;
  } else {
    item=CORDAS.find(c=>c.id===id);if(!item)return;
    cor=item.cor; imgSrc=item.img; nameTxt=item.nome;
    benefits.push({icon:'⭐',text:`+${item.xpBonus} XP a cada resposta correta`,color:cor});
    const owned=state.cordasCompradas.includes(id);
    const equipped=state.cordasEquipadas===id;
    const canBuy=!owned&&item.preco>0&&state.moedas>=item.preco;
    if(equipped) btnHtml=`<button class="modal-btn modal-btn--equipped">✓ Equipada</button>`;
    else if(owned) btnHtml=`<button class="modal-btn modal-btn--equip" onclick="equiparCordas('${id}');closeShopModal()">Equipar</button>`;
    else if(canBuy) btnHtml=`<button class="modal-btn modal-btn--buy" onclick="comprarCordas('${id}');closeShopModal()"><img src='moeda.png' style='width:14px;height:14px;vertical-align:middle;object-fit:contain'> ${item.preco.toLocaleString()}</button>`;
    else btnHtml=`<button class="modal-btn modal-btn--locked" disabled><img src='moeda.png' style='width:14px;height:14px;vertical-align:middle;object-fit:contain'> ${item.preco.toLocaleString()} · Saldo insuficiente</button>`;
  }
  const overlay=document.createElement('div');
  overlay.id='shop-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:8000;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;animation:fadeIn .18s ease;overflow-y:auto;';
  overlay.onclick=e=>{if(e.target===overlay)closeShopModal();};
  const benefitsHtml=benefits.map(b=>`
    <div style="display:flex;align-items:center;gap:.65rem;background:${b.color}18;border:1.5px solid ${b.color}44;border-radius:12px;padding:.65rem 1rem;">
      <span style="font-size:1.3rem">${b.icon}</span>
      <span style="font-size:.95rem;font-weight:800;color:${b.color}">${b.text}</span>
    </div>`).join('');
  overlay.innerHTML=`
    <div style="width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;position:relative;">
      <button onclick="closeShopModal()" style="position:fixed;top:1rem;right:1rem;z-index:9001;background:rgba(20,20,20,.92);border:1.5px solid #3a3a3a;border-radius:50%;width:40px;height:40px;color:#ccc;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)">✕</button>
      <div style="width:100%;background:radial-gradient(ellipse at 50% 55%,#252525 0%,#0c0c0c 100%);display:flex;align-items:center;justify-content:center;padding:3rem 0 1.5rem;flex-shrink:0;border-bottom:2px solid ${cor}22;">
        <img src="${imgSrc}" style="height:55vh;width:auto;max-width:96%;object-fit:contain;filter:drop-shadow(0 20px 50px rgba(0,0,0,1)) drop-shadow(0 0 30px ${cor}44)" onerror="this.style.opacity='.2'">
      </div>
      <div style="flex:1;background:#111;padding:1.4rem 1.3rem 3rem;border-top:2.5px solid ${cor}44;">
        <div style="font-size:1.45rem;font-weight:900;color:${cor};margin-bottom:.9rem;letter-spacing:-.02em">${nameTxt}</div>
        <div style="display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.2rem">${benefitsHtml}</div>
        ${item.preco>0?`<div style="font-size:.82rem;color:#888;margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem"><img src='moeda.png' style='width:15px;height:15px;object-fit:contain;vertical-align:middle'> Preço: <strong style="color:#F5A623">${item.preco.toLocaleString()} moedas</strong></div>`:''}
        ${btnHtml}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  shopModal=overlay;
}
function closeShopModal(){
  if(shopModal){shopModal.remove();shopModal=null;}
}

render();
</script>

</body>
